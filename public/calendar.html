<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark")})()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — TextApp</title>
  <link rel="stylesheet" href="/css/shared.css?v=2">
  <script src="/toast.js?v=2"></script>
</head>
<body>

<div id="sidebar-root"></div>
<div class="container">

  <!-- CALENDAR PAGE -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:2px;">Calendar</h2>
      <div style="font-size:13px;color:#9ca3af;">Your upcoming appointments</div>
    </div>
    <button class="btn btn-primary" onclick="openCreateApptModal()">+ New Appointment</button>
  </div>

  <!-- Today's Calls -->
  <div class="today-section" style="margin-bottom:20px;" id="today-section">
    <h3>Today's Calls <span class="today-count" id="today-count">0</span></h3>
    <div id="today-appts"><div style="color:#d1d5db;font-size:13px;">No calls scheduled for today</div></div>
  </div>

  <div class="cal-layout">
    <!-- Month View -->
    <div class="cal-main">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calPrev()">‹</button>
        <h2 id="cal-month-label"></h2>
        <button class="cal-nav-btn" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-day-labels">
        <div class="cal-day-label">Sun</div>
        <div class="cal-day-label">Mon</div>
        <div class="cal-day-label">Tue</div>
        <div class="cal-day-label">Wed</div>
        <div class="cal-day-label">Thu</div>
        <div class="cal-day-label">Fri</div>
        <div class="cal-day-label">Sat</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Day View -->
    <div class="today-section" id="day-view">
      <h3 id="day-view-label">Select a date</h3>
      <div id="day-appts"><div style="color:#d1d5db;font-size:13px;">Click a date to see appointments</div></div>
    </div>
  </div>

</div>

<!-- CREATE APPOINTMENT MODAL -->
<div class="modal-overlay" id="create-appt-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>New Appointment</h2>
      <button class="modal-close" onclick="document.getElementById('create-appt-modal').classList.remove('open')">×</button>
    </div>
    <div class="form-group">
      <label>Lead</label>
      <select id="appt-lead-id"><option value="">Select a lead...</option></select>
    </div>
    <div class="form-group">
      <label>Date & Time</label>
      <input type="datetime-local" id="appt-datetime">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="appt-notes" placeholder="Any notes from the conversation..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('create-appt-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewAppt()">Save Appointment</button>
    </div>
  </div>
</div>

<!-- RESCHEDULE MODAL -->
<div class="modal-overlay" id="reschedule-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h2>Reschedule</h2>
      <button class="modal-close" onclick="document.getElementById('reschedule-modal').classList.remove('open')">×</button>
    </div>
    <div class="form-group">
      <label>New Date & Time</label>
      <input type="datetime-local" id="reschedule-datetime">
    </div>
    <input type="hidden" id="reschedule-appt-id">
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('reschedule-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmReschedule()">Reschedule</button>
    </div>
  </div>
</div>

<script src="/js/shared.js?v=2"></script>
<script>
  let allAppointments = []
  let allLeads = []
  let calYear = new Date().getFullYear()
  let calMonth = new Date().getMonth()
  let selectedCalDate = null

  const loadAppointments = async () => {
    const calGrid = document.getElementById('cal-grid')
    if (calGrid && !allAppointments.length) {
      calGrid.innerHTML = Array(35).fill(0).map(() =>
        `<div class="cal-cell"><div class="skeleton" style="width:22px;height:14px;margin-bottom:6px;border-radius:4px;"></div><div class="skeleton" style="width:90%;height:10px;border-radius:4px;"></div></div>`
      ).join('')
    }
    try {
      const res = await fetch('/appointments')
      const data = await res.json()
      allAppointments = data.appointments || []
      renderCalendar()
      renderTodayAppts()
      updateCalBadge()
    } catch (err) {
      console.error(err)
      toast.error('Failed to load calendar', 'Could not fetch appointments')
      if (calGrid) calGrid.innerHTML = ''
    }
  }

  const updateCalBadge = () => {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz })
    const todayCount = allAppointments.filter(a => {
      return a.scheduled_at?.slice(0, 10) === todayStr && a.status === 'scheduled'
    }).length
    const badge = document.getElementById('today-appt-badge')
    if (todayCount > 0) { badge.textContent = todayCount; badge.style.display = 'inline'; }
    else badge.style.display = 'none'
  }

  const renderTodayAppts = () => {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz })
    const todays = allAppointments.filter(a => {
      const d = new Date(a.scheduled_at)
      return d.toLocaleDateString('en-CA', { timeZone: tz }) === todayStr
    })
    document.getElementById('today-count').textContent = todays.length
    const container = document.getElementById('today-appts')
    if (!todays.length) {
      if (!allAppointments.length) {
        container.innerHTML = `<div style="text-align:center;padding:40px 20px;">
          <div style="font-size:36px;margin-bottom:12px;">📅</div>
          <div style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:4px;">No appointments scheduled</div>
          <div style="font-size:13px;color:#9ca3af;">Appointments are created automatically when the AI books a call with a lead.</div>
        </div>`
      } else {
        container.innerHTML = `<div style="color:#d1d5db;font-size:13px;padding:12px 0;">No calls scheduled for today</div>`
      }
      return
    }
    container.innerHTML = todays.map(a => renderApptCard(a)).join('')
  }

  const renderCalendar = () => {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December']
    document.getElementById('cal-month-label').textContent = `${months[calMonth]} ${calYear}`
    const firstDay = new Date(calYear, calMonth, 1).getDay()
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate()
    const daysInPrev = new Date(calYear, calMonth, 0).getDate()
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz })

    const apptsByDate = {}
    allAppointments.forEach(a => {
      const d = new Date(a.scheduled_at).toLocaleDateString('en-CA', { timeZone: tz })
      if (!apptsByDate[d]) apptsByDate[d] = []
      apptsByDate[d].push(a)
    })

    let cells = ''
    for (let i = 0; i < firstDay; i++) {
      const d = daysInPrev - firstDay + i + 1
      cells += `<div class="cal-cell other-month"><div class="cal-date" style="color:#d1d5db;">${d}</div></div>`
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
      const isToday = dateStr === todayStr
      const isSelected = dateStr === selectedCalDate
      const dayAppts = apptsByDate[dateStr] || []
      const dots = dayAppts.slice(0, 3).map(a => `<div class="cal-dot cal-dot-${a.status}" title="${a.lead_name}"></div>`).join('')
      cells += `<div class="cal-cell${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}" onclick="selectCalDate('${dateStr}')">
        <div class="cal-date">${d}</div>
        ${dots}
      </div>`
    }
    const remaining = 42 - firstDay - daysInMonth
    for (let i = 1; i <= remaining; i++) {
      cells += `<div class="cal-cell other-month"><div class="cal-date" style="color:#d1d5db;">${i}</div></div>`
    }
    document.getElementById('cal-grid').innerHTML = cells
  }

  const selectCalDate = (dateStr) => {
    selectedCalDate = dateStr
    renderCalendar()
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
    const dayAppts = allAppointments.filter(a => {
      return new Date(a.scheduled_at).toLocaleDateString('en-CA', { timeZone: tz }) === dateStr
    })
    const label = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
    document.getElementById('day-view-label').textContent = label
    const container = document.getElementById('day-appts')
    if (!dayAppts.length) { container.innerHTML = `<div style="color:#9ca3af;font-size:13px;padding:12px 0;">No appointments this day</div>`; return }
    container.innerHTML = dayAppts.map(a => renderApptCard(a)).join('')
  }

  const renderApptCard = (a) => {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
    const localTime = new Date(a.scheduled_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone })
    const time = localTime
    const dateLabel = new Date(a.scheduled_at).toLocaleDateString('en-US', { timeZone: tz, month: 'short', day: 'numeric' })
    const name = a.lead_name || (a.leads ? `${a.leads.first_name || ''} ${a.leads.last_name || ''}`.trim() : 'Unknown')
    const phone = a.lead_phone || a.leads?.phone || ''
    return `<div class="appt-card">
      <div class="appt-card-header">
        <div>
          <div class="appt-name">${name}</div>
          <div class="appt-phone">${phone}</div>
        </div>
        <div style="text-align:right;">
          <div class="appt-time">${time}</div>
          <div style="font-size:11px;color:#9ca3af;">${dateLabel}</div>
        </div>
      </div>
      ${a.notes ? `<div class="appt-notes">${a.notes}</div>` : ''}
      <div style="margin-bottom:8px;"><span class="status-badge status-${a.status}">${a.status}</span></div>
      <div class="appt-actions">
        ${phone ? `<a href="tel:${phone}" class="btn btn-call btn-sm">📞 Call</a>` : ''}
        ${a.status === 'scheduled' ? `<button class="btn btn-success btn-sm" onclick="markApptComplete('${a.id}')">✓ Complete</button>` : ''}
        ${a.status === 'scheduled' ? `<button class="btn btn-secondary btn-sm" onclick="openReschedule('${a.id}')">Reschedule</button>` : ''}
        ${a.status !== 'cancelled' ? `<button class="btn btn-danger btn-sm" onclick="cancelAppt('${a.id}')">Cancel</button>` : ''}
      </div>
    </div>`
  }

  const calPrev = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear-- } renderCalendar() }
  const calNext = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++ } renderCalendar() }

  const markApptComplete = async (id) => {
    await fetch(`/appointments/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'completed' }) })
    await loadAppointments()
    if (selectedCalDate) selectCalDate(selectedCalDate)
  }

  const cancelAppt = async (id) => {
    if (!await confirmModal('Cancel appointment?', 'This will mark the appointment as cancelled.', 'Cancel appointment', true)) return
    await fetch(`/appointments/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'cancelled' }) })
    await loadAppointments()
    if (selectedCalDate) selectCalDate(selectedCalDate)
  }

  const openReschedule = (id) => {
    document.getElementById('reschedule-appt-id').value = id
    document.getElementById('reschedule-datetime').value = ''
    document.getElementById('reschedule-modal').classList.add('open')
  }

  const confirmReschedule = async () => {
    const id = document.getElementById('reschedule-appt-id').value
    const dt = document.getElementById('reschedule-datetime').value
    if (!dt) return toast.error('Required', 'Please select a date and time')
    await fetch(`/appointments/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ scheduled_at: new Date(dt).toISOString(), status: 'scheduled' }) })
    document.getElementById('reschedule-modal').classList.remove('open')
    await loadAppointments()
    if (selectedCalDate) selectCalDate(selectedCalDate)
  }

  const openCreateApptModal = () => {
    const select = document.getElementById('appt-lead-id')
    select.innerHTML = '<option value="">Select a lead...</option>' + allLeads.map(l => `<option value="${l.id}">${l.first_name} ${l.last_name} — ${l.phone}</option>`).join('')
    document.getElementById('appt-notes').value = ''
    document.getElementById('appt-datetime').value = ''
    document.getElementById('create-appt-modal').classList.add('open')
  }

  const saveNewAppt = async () => {
    const lead_id = document.getElementById('appt-lead-id').value
    const scheduled_at = document.getElementById('appt-datetime').value
    const notes = document.getElementById('appt-notes').value.trim()
    if (!lead_id || !scheduled_at) return toast.error('Required', 'Lead and date/time are required')
    const res = await fetch('/appointments', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lead_id, scheduled_at: new Date(scheduled_at).toISOString(), notes }) })
    const data = await res.json()
    if (data.success) { document.getElementById('create-appt-modal').classList.remove('open'); await loadAppointments(); toast.success('Appointment created', 'Appointment added to calendar') }
    else toast.error('Error', data.error || 'Failed to create appointment')
  }

  const init = async () => {
    const ok = await checkAuth()
    if (!ok) return
    await Promise.all([loadProfile(), loadAppointments()])
    // Load leads for the create-appt modal dropdown
    try {
      const res = await fetch('/leads')
      const data = await res.json()
      allLeads = data.leads || []
    } catch {}
    loadCalBadge()
    loadNotifBadge()
    setInterval(loadNotifBadge, 60000)
  }

  document.addEventListener('DOMContentLoaded', init)
</script>
</body>
</html>
