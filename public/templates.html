<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates — Veloxo</title>
  <link rel="stylesheet" href="/css/shared.css?v=2">
  <script src="/toast.js?v=2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <style>
    .templates-grid { padding: 20px; }
    .templates-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
    .templates-card h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .templates-card > p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
    .templates-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .templates-header h2 { margin-bottom: 0; }
    .section-title { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; margin-top: 20px; }
    .template-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 8px; transition: border-color 0.12s; }
    .template-row:hover { border-color: var(--border-strong); }
    .template-row .drag-handle { cursor: grab; color: var(--text-disabled); flex-shrink: 0; }
    .template-row .drag-handle:active { cursor: grabbing; }
    .template-info { flex: 1; min-width: 0; }
    .template-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .template-preview { font-size: 12.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }
    .template-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    /* Form group for modal */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
    .form-group input, .form-group textarea { width: 100%; padding: 8px 11px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; font-size: 13px; color: var(--input-text); font-family: inherit; outline: none; box-sizing: border-box; transition: border-color 0.12s, background 0.12s; }
    .form-group input:focus, .form-group textarea:focus { border-color: rgba(0,201,167,0.35); background: rgba(0,201,167,0.04); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--input-placeholder); }
    .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; }
    .tip { font-size: 12px; color: var(--text-muted); background: rgba(0,201,167,0.05); border: 1px solid rgba(0,201,167,0.1); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; line-height: 1.6; }
    .sortable-ghost { opacity: 0.3; }
    .sortable-chosen { background: rgba(0,201,167,0.06); border-color: rgba(0,201,167,0.2); }
  </style>
</head>
<body>

<div id="sidebar-root"></div>
<div class="main-content">
  <div class="topbar">
    <span class="topbar-title">Templates</span>
    <div class="topbar-actions">
      <button class="btn-primary" onclick="openCreateTemplateModal()">+ New Template</button>
    </div>
  </div>
  <div class="templates-grid">
    <div class="templates-card">
      <p>Save your best messages and fire them with one click from any conversation. Drag to reorder.</p>
      <div class="section-title">Your Templates</div>
      <div id="templates-list">
        <div style="color:var(--text-muted);font-size:13px;padding:20px 0;">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- TEMPLATE MODAL -->
<div class="modal-overlay" id="template-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="template-modal-title">Create Template</h2>
      <button class="modal-close" onclick="closeTemplateModal()">&times;</button>
    </div>
    <div class="tip">Use <strong>[First Name]</strong> for personalization. Use <strong>{Hi|Hey|Hello}</strong> to randomize phrasing on each send.</div>
    <div class="form-group">
      <label>Template Name</label>
      <input type="text" id="template-modal-name" placeholder="e.g. Initial Follow Up, Booking Nudge, Re-engagement">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="template-modal-body" rows="4" placeholder="Hi [First Name], just following up..." oninput="document.getElementById('template-modal-char').textContent = this.value.length + ' / 160'"></textarea>
      <div class="char-count" id="template-modal-char">0 / 160</div>
      <div id="template-modal-chips"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeTemplateModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTemplate()">Save Template</button>
    </div>
  </div>
</div>

<script src="/js/shared.js?v=2"></script>
<script>
  let allTemplates = []
  let editingTemplateId = null

  // ─── LOAD ─────────────────────────────────────────────────────────────────────

  const loadTemplates = async () => {
    try {
      const res = await fetch('/templates')
      const data = await res.json()
      allTemplates = data.templates || []
      renderTemplatesList()
    } catch (err) { console.error(err) }
  }

  const renderTemplatesList = () => {
    const container = document.getElementById('templates-list')
    if (!container) return
    if (!allTemplates.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-title">No templates yet</div>
          <div class="empty-state-sub">Create your first preset template to speed up conversations.</div>
          <button class="btn-primary" onclick="openCreateTemplateModal()">+ New Template</button>
        </div>`
      return
    }
    container.innerHTML = allTemplates.map(t => `
      <div class="template-row" data-template-id="${t.id}">
        <div class="drag-handle" title="Drag to reorder">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="4" cy="3" r="1.2" fill="currentColor" opacity="0.4"/>
            <circle cx="4" cy="7" r="1.2" fill="currentColor" opacity="0.4"/>
            <circle cx="4" cy="11" r="1.2" fill="currentColor" opacity="0.4"/>
            <circle cx="9" cy="3" r="1.2" fill="currentColor" opacity="0.4"/>
            <circle cx="9" cy="7" r="1.2" fill="currentColor" opacity="0.4"/>
            <circle cx="9" cy="11" r="1.2" fill="currentColor" opacity="0.4"/>
          </svg>
        </div>
        <div class="template-info">
          <div class="template-name">${t.name}</div>
          <div class="template-preview">${t.body}</div>
        </div>
        <div class="template-actions">
          <button class="btn-ghost" onclick="editTemplate('${t.id}')">Edit</button>
          <button class="btn-ghost" style="color:#f87171;border-color:rgba(239,68,68,0.3);" onclick="deleteTemplate('${t.id}')">Delete</button>
        </div>
      </div>
    `).join('')
    if (typeof Sortable !== 'undefined') {
      Sortable.create(container, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: function () {
          const items = container.querySelectorAll('[data-template-id]')
          const newOrder = Array.from(items).map((el, index) => ({
            id: el.dataset.templateId,
            sort_order: index
          }))
          fetch('/templates/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order: newOrder })
          }).catch(err => console.error('Reorder save failed:', err))
        }
      })
    }
  }

  // ─── MODAL ────────────────────────────────────────────────────────────────────

  const openCreateTemplateModal = () => {
    editingTemplateId = null
    document.getElementById('template-modal-name').value = ''
    document.getElementById('template-modal-body').value = ''
    document.getElementById('template-modal-char').textContent = '0 / 160'
    document.getElementById('template-modal-title').textContent = 'Create Template'
    const chips = document.getElementById('template-modal-chips')
    if (chips && typeof kwChipsRowHTML !== 'undefined') chips.innerHTML = kwChipsRowHTML("document.getElementById('template-modal-body')")
    document.getElementById('template-modal').classList.add('open')
  }

  const closeTemplateModal = () => document.getElementById('template-modal').classList.remove('open')

  const editTemplate = (id) => {
    const t = allTemplates.find(t => t.id === id)
    if (!t) return
    editingTemplateId = id
    document.getElementById('template-modal-name').value = t.name
    document.getElementById('template-modal-body').value = t.body
    document.getElementById('template-modal-char').textContent = `${t.body.length} / 160`
    document.getElementById('template-modal-title').textContent = 'Edit Template'
    const chips = document.getElementById('template-modal-chips')
    if (chips && typeof kwChipsRowHTML !== 'undefined') chips.innerHTML = kwChipsRowHTML("document.getElementById('template-modal-body')")
    document.getElementById('template-modal').classList.add('open')
  }

  const saveTemplate = async () => {
    const name = document.getElementById('template-modal-name').value.trim()
    const body = document.getElementById('template-modal-body').value.trim()
    if (!name) return toast.error('Required', 'Please enter a template name')
    if (!body) return toast.error('Required', 'Please enter a message body')
    try {
      const url = editingTemplateId ? `/templates/${editingTemplateId}` : '/templates'
      const method = editingTemplateId ? 'PUT' : 'POST'
      const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, body }) })
      const data = await res.json()
      if (data.success) { closeTemplateModal(); loadTemplates(); toast.success('Template saved', editingTemplateId ? 'Template updated' : 'New template created') }
      else toast.error('Save failed', data.error || 'Could not save template')
    } catch (err) { toast.error('Error', 'Something went wrong') }
  }

  const deleteTemplate = async (id) => {
    if (!await confirmModal('Delete template?', 'This template will be permanently removed.', 'Delete', true)) return
    await fetch(`/templates/${id}`, { method: 'DELETE' })
    loadTemplates()
    toast.info('Template deleted', 'Template removed')
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────────

  const init = async () => {
    const authed = await checkAuth()
    if (!authed) return
    await loadTemplates()
    loadCalBadge()
    loadNotifBadge()
    setInterval(loadNotifBadge, 30000)
  }

  init()
</script>
</body>
</html>
