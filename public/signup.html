<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — TextApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 480px; border: 1px solid #f0f0f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .logo span { color: #6366f1; }
    .sub { font-size: 13px; color: #9ca3af; margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; background: white; }
    input:focus, select:focus { border-color: #6366f1; }
    .btn { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 4px; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #c7d2fe; cursor: not-allowed; }
    .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .section-title { font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 12px; }
    .invalid { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px 0; }
    .invalid-icon { font-size: 40px; }
    .invalid-text { font-size: 15px; font-weight: 600; color: #374151; }
    .invalid-sub { font-size: 13px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Text<span>App</span></div>
    <div class="sub" id="sub-text">You have been invited to join TextApp</div>
    <div class="error" id="error-msg"></div>
    <div id="form-container">
      <input type="hidden" id="invite-token">
      <input type="hidden" id="invite-email">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email-display" readonly style="background:#f9fafb;">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
        </div>
      </div>
      <div class="section-title">Your Profile</div>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="agent-name" placeholder="Nick Kuhl">
        </div>
        <div class="form-group">
          <label>Agency Name</label>
          <input type="text" id="agency-name" placeholder="Coverage by Kuhl">
        </div>
      </div>
      <div class="form-group">
        <label>Calendly URL <span style="color:#9ca3af;font-weight:400;">(optional)</span></label>
        <input type="text" id="calendly-url" placeholder="https://calendly.com/your-link">
      </div>
      <div class="form-group">
        <label>Timezone</label>
        <select id="timezone">
          <option value="America/New_York">Eastern</option>
          <option value="America/Chicago">Central</option>
          <option value="America/Denver">Mountain</option>
          <option value="America/Los_Angeles">Pacific</option>
          <option value="America/Phoenix">Arizona</option>
          <option value="America/Anchorage">Alaska</option>
          <option value="Pacific/Honolulu">Hawaii</option>
        </select>
      </div>
      <button class="btn" id="submit-btn" onclick="createAccount()">Create Account</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const token = params.get('token')

    const init = async () => {
      if (!token) return showInvalid('No invite token found.')
      const res = await fetch(`/auth/validate-token/${token}`)
      const data = await res.json()
      if (!data.valid) return showInvalid(data.reason || 'This invite link is invalid.')
      document.getElementById('invite-token').value = token
      document.getElementById('invite-email').value = data.email
      document.getElementById('email-display').value = data.email
    }

    const showInvalid = (reason) => {
      document.getElementById('form-container').innerHTML = `
        <div class="invalid">
          <div class="invalid-icon">🔗</div>
          <div class="invalid-text">Invalid invite link</div>
          <div class="invalid-sub">${reason}</div>
          <a href="/login.html" style="color:#6366f1;font-size:13px;">Go to login</a>
        </div>`
    }

    const createAccount = async () => {
      const token = document.getElementById('invite-token').value
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm-password').value
      const agent_name = document.getElementById('agent-name').value.trim()
      const agency_name = document.getElementById('agency-name').value.trim()
      const calendly_url = document.getElementById('calendly-url').value.trim()
      const timezone = document.getElementById('timezone').value
      const btn = document.getElementById('submit-btn')
      const errEl = document.getElementById('error-msg')

      if (!password || !confirm) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return }
      if (!agent_name) { errEl.textContent = 'Your name is required.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Creating account...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/signup-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, agent_name, agency_name, calendly_url, timezone })
        })
        const data = await res.json()
        if (data.success) {
          window.location.href = '/login.html'
        } else {
          errEl.textContent = data.error || 'Failed to create account.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create Account'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Create Account'
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') createAccount() })
    init()
  </script>
</body>
</html>
