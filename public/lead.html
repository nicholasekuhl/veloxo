<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Profile — Veloxo</title>
  <link rel="stylesheet" href="/css/shared.css?v=1">
  <script src="/toast.js?v=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    /* ── Base ── */
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-base); color: var(--text-secondary); }
    .lead-profile-wrap { padding: 20px 24px 48px; }

    /* ── Buttons ── */
    .btn { border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-primary { background: linear-gradient(135deg, #00c9a7, #0ea5e9); color: #0b0f12; font-weight: 600; box-shadow: 0 2px 14px rgba(0,201,167,0.3); }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(0,201,167,0.45); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-secondary); }
    .btn-secondary:hover { background: var(--bg-active); color: var(--text-primary); }
    .btn-ghost { background: none; color: var(--text-muted); border: 1px solid var(--input-border); }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }
    .btn-call { background: var(--bg-active); border: 1px solid var(--input-border); color: var(--text-secondary); }
    .btn-call:hover { background: var(--border-strong); color: var(--text-primary); }
    .btn-sms { background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.2); color: #38bdf8; }
    .btn-sms:hover { background: rgba(14,165,233,0.18); }
    .btn-disposition { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); color: #c4b5fd; }
    .btn-disposition:hover { background: rgba(139,92,246,0.18); }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; padding: 6px 12px; border-radius: 8px; font-family: inherit; transition: background 0.15s, color 0.15s; }
    .back-btn:hover { background: var(--input-bg); color: var(--text-primary); }

    /* ── Lead header card ── */
    .lead-header { background: var(--bg-card); border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; border: 1px solid var(--border); }
    .lead-header-top { display: flex; align-items: flex-start; gap: 20px; }
    .lead-avatar { width: 64px; height: 64px; border-radius: 12px; background: linear-gradient(135deg, rgba(0,201,167,0.25), rgba(14,165,233,0.25)); color: #00d4b4; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .lead-name { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; letter-spacing: -0.3px; }
    .lead-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .lead-meta span { display: flex; align-items: center; gap: 4px; }
    .copy-btn { background: none; border: none; cursor: pointer; padding: 2px 3px; color: var(--text-disabled); border-radius: 4px; line-height: 1; display: inline-flex; align-items: center; vertical-align: middle; flex-shrink: 0; transition: color 0.15s; }
    .copy-btn:hover { color: #00d4b4; }
    .copy-btn.copied { color: #34d399; }
    .lead-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .tag-new { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .tag-contacted { background: rgba(52,211,153,0.12); color: #34d399; }
    .tag-replied { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .tag-booked { background: rgba(0,212,180,0.12); color: #00d4b4; }
    .tag-sold { background: rgba(52,211,153,0.12); color: #34d399; }
    .tag-opted_out { background: rgba(239,68,68,0.12); color: #f87171; }
    .tag-cold { background: var(--bg-active); color: var(--text-muted); }
    .tag-campaign { background: rgba(139,92,246,0.12); color: #c4b5fd; }
    .disposition-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; }
    .lead-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; flex-shrink: 0; }

    /* ── Follow-up bar ── */
    .followup-bar { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .followup-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(251,191,36,0.1); color: #fbbf24; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid rgba(251,191,36,0.2); }
    .followup-badge:hover { background: rgba(251,191,36,0.18); }

    /* ── Notes + Quoted Plans row ── */
    .lead-notes-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px 24px; background: var(--bg-card); border-bottom: 1px solid var(--border); }
    .lead-notes-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .lead-notes-textarea { width: 100%; min-height: 110px; resize: vertical; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12.5px; line-height: 1.6; color: var(--input-text); font-family: inherit; outline: none; transition: border-color 0.12s, background 0.12s; display: block; box-sizing: border-box; }
    .lead-notes-textarea::placeholder { color: var(--input-placeholder); font-size: 12px; }
    .lead-notes-textarea:focus { border-color: rgba(0,201,167,0.35); background: rgba(0,201,167,0.04); }
    .lead-quotes-textarea:focus { border-color: rgba(251,191,36,0.35) !important; background: rgba(251,191,36,0.03) !important; }
    .lead-notes-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .lead-notes-ts { font-size: 10.5px; color: var(--text-disabled); }
    #save-notes-btn, #save-quotes-btn { font-size: 11px; font-weight: 500; color: rgba(0,201,167,0.6); background: none; border: none; cursor: pointer; transition: color 0.12s; font-family: inherit; padding: 0; }
    #save-notes-btn:hover, #save-quotes-btn:hover { color: #00d4b4; }

    /* ── Info grid ── */
    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .info-item { background: var(--bg-hover); border-radius: 8px; padding: 10px 14px; border: 1px solid var(--border-subtle); }
    .info-item .lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .info-item .val { font-size: 13px; font-weight: 500; color: var(--input-text); }

    /* ── Disposition picker ── */
    .disp-picker-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .disp-pick-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; color: #fff; transition: opacity 0.15s; }
    .disp-pick-btn:hover { opacity: 0.85; }

    /* ── Main two-column layout ── */
    .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }

    /* ── Tabs card ── */
    .tabs-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .tabs-nav { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab-btn { padding: 13px 18px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; font-family: inherit; margin-bottom: -1px; }
    .tab-btn.active { color: #00d4b4; border-bottom-color: #00d4b4; }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }
    .tab-panel { display: none; padding: 18px 20px; }
    .tab-panel.active { display: block; }

    /* ── Activity log ── */
    .activity-item { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--bg-hover); }
    .activity-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .activity-icon.sms { background: rgba(14,165,233,0.12); }
    .activity-icon.disposition { background: rgba(139,92,246,0.12); }
    .activity-icon.note { background: rgba(251,191,36,0.12); }
    .activity-icon.task { background: rgba(52,211,153,0.12); }
    .activity-icon.call { background: rgba(0,201,167,0.12); }
    .activity-info { flex: 1; }
    .activity-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── SMS panel ── */
    .sms-history { max-height: 400px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { display: flex; flex-direction: column; max-width: 75%; }
    .msg.inbound { align-self: flex-start; }
    .msg.outbound { align-self: flex-end; }
    .msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
    .msg.inbound .msg-bubble { background: var(--bg-elevated); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .msg.outbound .msg-bubble { background: linear-gradient(135deg, #00c9a7, #0ea5e9); color: #0b0f12; border-bottom-right-radius: 4px; }
    .msg.outbound.ai .msg-bubble { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff; }
    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .msg.outbound .msg-time { text-align: right; }
    .msg-label { font-size: 10px; color: var(--text-muted); }
    .msg.outbound .msg-label { text-align: right; }
    .sms-send-area { border-top: 1px solid var(--border); padding-top: 16px; }
    .template-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .sms-input-row { display: flex; gap: 8px; }
    .sms-textarea { flex: 1; padding: 9px 13px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-family: inherit; resize: none; height: 42px; outline: none; transition: all 0.2s; background: var(--bg-hover); color: var(--input-text); }
    .sms-textarea:focus { border-color: rgba(0,201,167,0.35); height: 84px; }
    .sms-textarea::placeholder { color: var(--input-placeholder); }
    .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 3px; }
    .char-count.warning { color: #fbbf24; }
    .char-count.danger { color: #f87171; }

    /* ── Tasks ── */
    .task-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--bg-hover); }
    .task-check { width: 18px; height: 18px; cursor: pointer; accent-color: #00c9a7; flex-shrink: 0; }
    .task-info { flex: 1; }
    .task-title { font-size: 13px; font-weight: 500; color: var(--input-text); }
    .task-title.done { text-decoration: line-through; color: var(--text-muted); }
    .task-due { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .task-due.overdue { color: #f87171; }
    .task-due.today { color: #fbbf24; }
    .add-task-form { background: var(--bg-hover); border-radius: 10px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border); display: none; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 11px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; background: var(--input-bg); color: var(--input-text); box-sizing: border-box; }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--input-placeholder); }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: rgba(0,201,167,0.4); background: rgba(0,201,167,0.03); }

    /* ── Disposition history ── */
    .disp-history-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--bg-hover); }
    .disp-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .disp-info { flex: 1; }
    .disp-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .disp-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Call log ── */
    .call-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--bg-hover); }
    .call-direction { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .call-direction.out { background: rgba(0,201,167,0.12); }
    .call-direction.in { background: rgba(14,165,233,0.12); }
    .call-info { flex: 1; }
    .call-result { font-size: 13px; font-weight: 500; color: var(--input-text); }
    .call-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── AI Insights ── */
    .insights-card { background: rgba(139,92,246,0.08); border-radius: 12px; padding: 18px; border: 1px solid rgba(139,92,246,0.2); margin-bottom: 16px; }
    .insights-label { font-size: 11px; font-weight: 600; color: #c4b5fd; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .insights-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .insights-loading { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; }

    /* ── Right panel ── */
    .right-panel { display: flex; flex-direction: column; gap: 14px; }
    .panel-card { background: var(--bg-card); border-radius: 12px; padding: 18px; border: 1px solid var(--border); }
    .panel-card h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
    .autopilot-wrap { display: flex; align-items: center; justify-content: space-between; padding: 11px 13px; background: var(--bg-hover); border-radius: 9px; }
    .autopilot-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .autopilot-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--input-border); border-radius: 22px; transition: background 0.2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background: #fff; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    input:checked + .toggle-slider { background: linear-gradient(90deg, #00c9a7, #0ea5e9); }
    input:checked + .toggle-slider:before { transform: translateX(18px); }
    .status-select { width: 100%; padding: 8px 11px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 13px; outline: none; background: var(--input-bg); color: var(--input-text); margin-top: 10px; font-family: inherit; }
    .quick-stat { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--bg-hover); font-size: 13px; }
    .quick-stat:last-child { border-bottom: none; }
    .quick-stat .lbl { color: var(--text-muted); }
    .quick-stat .val { font-weight: 500; color: var(--text-secondary); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }
  </style>
</head>
<body>

<div id="sidebar-root"></div>

<div class="main-content">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
          <path d="M4 10h9" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"/>
          <path d="M4 7h6" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round"/>
          <path d="M4 13h4" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
          <path d="M11 5.5L16 10L11 14.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text"><span class="logo-velox">velox</span>o</span>
    </div>
    <button class="back-btn" onclick="window.history.back()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
      Back
    </button>
  </div>

  <div class="lead-profile-wrap" id="main-container">
    <div class="empty-state">Loading lead profile...</div>
  </div>
</div>

<script src="/js/shared.js?v=1"></script>
<script>
  const params = new URLSearchParams(window.location.search)
  const leadId = params.get('id')

  let lead = null
  let allTemplates = []
  let allDispositionTags = []
  let allCampaigns = []
  let conversation = null
  let tasks = []
  let dispositionHistory = []
  let callLog = []

  const formatDateTime = (iso) => {
    if (!iso) return '—'
    const d = new Date(iso)
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
  }

  const init = async () => {
    const authed = await checkAuth()
    if (!authed) return

    if (!leadId) {
      document.getElementById('main-container').innerHTML = '<div class="empty-state">No lead ID provided</div>'
      return
    }

    try {
      const leadRes = await fetch(`/leads/${leadId}`, { credentials: 'include' })
      const leadData = await leadRes.json()
      lead = leadData.lead

      if (!lead) {
        document.getElementById('main-container').innerHTML = '<div class="empty-state">Lead not found</div>'
        return
      }

      // Load secondary data in parallel — failures won't block the page
      const [templatesData, dispositionsData, campaignsData] = await Promise.all([
        fetch('/templates', { credentials: 'include' }).then(r => r.json()).catch(() => ({})),
        fetch('/dispositions', { credentials: 'include' }).then(r => r.json()).catch(() => ({})),
        fetch('/campaigns', { credentials: 'include' }).then(r => r.json()).catch(() => ({}))
      ])

      allTemplates = templatesData.templates || []
      allDispositionTags = dispositionsData.tags || []
      allCampaigns = campaignsData.campaigns || []

      renderPage()
      loadConversation()
      loadTasks()
      loadDispositionHistory()
      loadLeadAppointments()
      loadLeadHousehold()

    } catch (err) {
      console.error(err)
      document.getElementById('main-container').innerHTML = '<div class="empty-state">Failed to load lead</div>'
    }
  }

  const renderPage = () => {
    const name = [lead.first_name, lead.last_name].filter(Boolean).join(' ') || 'Unknown'
    const safeName = name.replace(/'/g, "\\'")
    const initials = getInitials(lead.first_name, lead.last_name)
    const dispTag = allDispositionTags.find(t => t.id === lead.disposition_tag_id)

                <input type="date" id="lead-hh-dob" style="width:100%;padding:7px 10px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:7px;font-size:13px;color:var(--input-text);font-family:inherit;outline:none;box-sizing:border-box;">

      <!-- MAIN LAYOUT -->
      <div class="main-layout">

        <!-- LEFT: TABS -->
        <div class="tabs-card">

          <!-- DISPOSITION HISTORY -->

          <!-- CALL LOG -->
          <div class="tab-panel" id="tab-calls">

          <!-- APPOINTMENTS -->

            <button class="btn btn-primary" onclick="generateInsights()" id="insights-btn">⚡ Generate Insights</button>
          </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

          <div class="panel-card">
            <h3>Lead Controls</h3>

                <div class="autopilot-label">Autopilot</div>
                <div class="autopilot-sublabel">AI responds automatically</div>
              </div>
              <label class="toggle">

                <span class="toggle-slider"></span>
              </label>
            </div>
            <select class="status-select" onchange="updateStatus(this.value)">
              <option value="new" ${lead.status === 'new' ? 'selected' : ''}>New</option>
              <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
              <option value="booked" ${lead.status === 'booked' ? 'selected' : ''}>Booked</option>
              <option value="opted_out" ${lead.status === 'opted_out' ? 'selected' : ''}>Opted Out</option>
            </select>
          </div>

          <div class="panel-card">
            <h3>Quick Stats</h3>
            <div class="quick-stat"><span class="lbl">Status</span><span class="val">${lead.status}</span></div>
            <div class="quick-stat"><span class="lbl">Autopilot</span><span class="val">${lead.autopilot ? 'ON' : 'OFF'}</span></div>
            <div class="quick-stat"><span class="lbl">📁 Bucket</span><span class="val">${lead.bucket || '—'}</span></div>
            <div class="quick-stat"><span class="lbl">Added</span><span class="val">${formatDate(lead.created_at)}</span></div>
            <div class="quick-stat"><span class="lbl">Product</span><span class="val">${lead.product || '—'}</span></div>
            <div class="quick-stat"><span class="lbl">Timezone</span><span class="val">${lead.timezone?.replace('America/', '') || '—'}</span></div>
            ${lead.is_sold && lead.commission ? `<div class="quick-stat"><span class="lbl">💰 Commission</span><span class="val" style="color:${lead.commission_status === 'paid' ? '#059669' : '#d97706'};font-weight:600;">$${parseFloat(lead.commission).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })} <span style="font-size:11px;opacity:0.8;">(${lead.commission_status === 'paid' ? 'paid ✓' : lead.commission_status || 'pending'})</span></span></div>` : ''}
          </div>

          <div class="panel-card">
            <h3>⚡ Active Campaign</h3>
            <div id="active-campaigns-list"><div style="font-size:13px;color:var(--text-muted);">Loading...</div></div>
          </div>

        </div>
      </div>
    `

    renderTemplatePills()
    loadActiveCampaigns()
  }

  const switchTab = (tab) => {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const tabs = ['activity', 'sms', 'tasks', 'dispositions', 'calls', 'appointments', 'insights']
      btn.classList.toggle('active', tabs[i] === tab)
    })
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
    document.getElementById(`tab-${tab}`)?.classList.add('active')
    if (tab === 'appointments') loadLeadAppointments()
  }

  const loadLeadAppointments = async () => {
    try {
      const res = await fetch(`/appointments/lead/${leadId}`, { credentials: 'include' })
      const data = await res.json()
      const container = document.getElementById('lead-appts-list')
      if (!data.appointments?.length) {
        container.innerHTML = `<div class="empty-state">No appointments yet</div>`
        return
      }
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone
      container.innerHTML = data.appointments.map(a => {
        const dt = new Date(a.scheduled_at)
        const dateStr = dt.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' })
        const timeStr = dt.toLocaleTimeString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit' })
        return `<div style="padding:12px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="font-size:14px;font-weight:600;">${dateStr} at ${timeStr}</div>
            <span class="status-badge status-${a.status}">${a.status}</span>
          </div>
          ${a.notes ? `<div style="font-size:13px;color:var(--text-secondary);">${a.notes}</div>` : ''}
        </div>`
      }).join('')
    } catch (err) { console.error(err) }
  }

  const loadConversation = async () => {
    const smsHistory = document.getElementById('sms-history')
    if (smsHistory && !conversation) {
      smsHistory.innerHTML = Array(4).fill(0).map((_, i) => `
        <div style="display:flex;flex-direction:column;align-items:${i % 2 === 0 ? 'flex-start' : 'flex-end'};margin-bottom:14px;">
          <div class="skeleton" style="height:38px;width:${55 + (i % 3) * 15}%;border-radius:12px;"></div>
          <div class="skeleton" style="height:10px;width:60px;margin-top:4px;border-radius:4px;"></div>
        </div>`).join('')
    }
    try {
      const res = await fetch('/conversations', { credentials: 'include' })
      const data = await res.json()
      const conv = (data.conversations || []).find(c => c.lead_id === leadId)
      if (!conv) { if (smsHistory) renderSMSHistory(); return }
      const res2 = await fetch(`/conversations/${conv.id}`, { credentials: 'include' })
      const data2 = await res2.json()
      conversation = data2.conversation
      renderSMSHistory()
      renderActivityLog()
    } catch (err) {
      console.error(err)
      toast.error('Failed to load messages', 'Could not fetch conversation')
      if (smsHistory) smsHistory.innerHTML = '<div class="empty-state">Could not load messages.</div>'
    }
  }

  const renderSMSHistory = () => {
    const container = document.getElementById('sms-history')
    if (!container) return
    const messages = conversation?.messages || []
    if (!messages.length) {
      container.innerHTML = '<div class="empty-state">No messages yet</div>'
      return
    }
    container.innerHTML = messages.map(m => `
      <div class="msg ${m.direction} ${m.is_ai ? 'ai' : ''}">
        <div class="msg-bubble">${m.body}</div>
        <div class="msg-time">${formatTime(m.sent_at)}</div>
        ${m.is_ai ? '<div class="msg-label">AI response</div>' : ''}
      </div>
    `).join('')
    container.scrollTop = container.scrollHeight
  }

  const renderActivityLog = () => {
    const container = document.getElementById('activity-list')
    if (!container) return
    const items = []
    const messages = conversation?.messages || []
    messages.forEach(m => {
      items.push({
        time: new Date(m.sent_at),
        icon: m.direction === 'inbound' ? '💬' : '📤',
        type: 'sms',
        text: m.direction === 'inbound' ? `Lead replied: "${m.body.substring(0, 60)}${m.body.length > 60 ? '...' : ''}"` : `${m.is_ai ? 'AI sent' : 'You sent'}: "${m.body.substring(0, 60)}${m.body.length > 60 ? '...' : ''}"`
      })
    })
    dispositionHistory.forEach(h => {
      items.push({
        time: new Date(h.applied_at),
        icon: '🏷️',
        type: 'disposition',
        text: `Disposition applied: ${h.disposition_tags?.name || 'Unknown'}${h.notes ? ' — ' + h.notes : ''}`
      })
    })
    tasks.forEach(t => {
      items.push({
        time: new Date(t.created_at),
        icon: '✅',
        type: 'task',
        text: `Task created: ${t.title} — due ${formatDateTime(t.due_date)}`
      })
      if (t.completed && t.completed_at) {
        items.push({
          time: new Date(t.completed_at),
          icon: '✅',
          type: 'task',
          text: `Task completed: ${t.title}`
        })
      }
    })
    callLog.forEach(c => {
      items.push({
        time: new Date(c.logged_at || c.created_at),
        icon: '📞',
        type: 'call',
        text: `Call logged: ${c.outcome}${c.duration ? ' (' + c.duration + ' min)' : ''}${c.notes ? ' — ' + c.notes : ''}`
      })
    })
    items.sort((a, b) => b.time - a.time)
    if (!items.length) { container.innerHTML = '<div class="empty-state">No activity yet</div>'; return }
    container.innerHTML = items.map(item => `
      <div class="activity-item">
        <div class="activity-icon ${item.type}">${item.icon}</div>
        <div class="activity-info">
          <div class="activity-text">${item.text}</div>
          <div class="activity-time">${formatTime(item.time.toISOString())}</div>
        </div>
      </div>
    `).join('')
  }

  const renderTemplatePills = () => {
    const container = document.getElementById('template-pills')
    if (!container) return
    if (!allTemplates.length) { container.innerHTML = ''; return }
    container.innerHTML = allTemplates.map(t => `
      <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="useTemplate('${t.id}')">📝 ${t.name}</button>
    `).join('')
  }

  const useTemplate = (templateId) => {
    const template = allTemplates.find(t => t.id === templateId)
    if (!template) return
    const input = document.getElementById('sms-input')
    if (!input) return
    input.value = template.body.replace(/\[First Name\]/g, lead.first_name || 'there')
    input.style.height = '84px'
    updateSMSChar(input)
    switchTab('sms')
  }

  const updateSMSChar = (textarea) => {
    const count = textarea.value.length
    const el = document.getElementById('sms-char')
    if (!el) return
    el.textContent = `${count} / 160`
    el.className = 'char-count' + (count > 160 ? ' danger' : count > 130 ? ' warning' : '')
  }

  const sendSMS = async () => {
    const input = document.getElementById('sms-input')
    const body = input?.value.trim()
    if (!body) return toast.error('Required', 'Please enter a message')
    if (!conversation) {
      const res = await fetch('/conversations', { credentials: 'include' })
      const data = await res.json()
      conversation = (data.conversations || []).find(c => c.lead_id === leadId)
      if (!conversation) {
        toast.warning('No conversation', 'Send the first message from the leads page')
        return
      }
      const res2 = await fetch(`/conversations/${conversation.id}`, { credentials: 'include' })
      const data2 = await res2.json()
      conversation = data2.conversation
    }
    try {
      const res = await fetch('/messages/send-manual', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversation.id, lead_id: leadId, body }),
        credentials: 'include'
      })
      const data = await res.json()
      if (data.success) {
        input.value = ''
        input.style.height = '42px'
        updateSMSChar(input)
        await loadConversation()
        switchTab('sms')
        toast.success('Message sent', 'SMS delivered successfully')
      } else toast.error('Send failed', data.error || 'Could not send message')
    } catch (err) { toast.error('Error', 'Something went wrong') }
  }

          </div>
        </div>`).join('')
    }

    const container = document.getElementById('tasks-list')
    if (!container) return
    if (!tasks.length) { container.innerHTML = '<div class="empty-state">No tasks yet</div>'; return }
    const now = new Date()
    container.innerHTML = tasks.map(t => {
      const due = new Date(t.due_date)
      const isOverdue = !t.completed && due < now
      const isToday = !t.completed && due.toDateString() === now.toDateString()
      return `
        <div class="task-row">
          <input type="checkbox" class="task-check" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
          <div class="task-info">
            <div class="task-title ${t.completed ? 'done' : ''}">${t.title}</div>
            <div class="task-due ${isOverdue ? 'overdue' : isToday ? 'today' : ''}">${isOverdue ? '⚠️ Overdue — ' : isToday ? '📅 Today — ' : ''}${formatDateTime(t.due_date)}${t.notes ? ' · ' + t.notes : ''}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Delete</button>
        </div>

    }).join('')
  }

      document.getElementById('task-due').value = `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth()+1)}-${pad(tomorrow.getDate())}T${pad(tomorrow.getHours())}:${pad(tomorrow.getMinutes())}`

    try {

      const dispHistory = dispositionHistory.map(h => h.disposition_tags?.name).filter(Boolean)

        method: 'POST',

          conversation_id: conversation?.id || 'none',

      })

        text.className = 'insights-text'
        text.textContent = data.suggestion
      } else {
        const name = [lead.first_name, lead.last_name].filter(Boolean).join(' ')
        const msgCount = messages.length
        const lastMsg = messages[messages.length - 1]
        const inbound = messages.filter(m => m.direction === 'inbound').length

        text.className = 'insights-text'
        text.innerHTML = `

          ${inbound > 0 ? '📌 Lead has engaged — prioritize follow-up and move toward booking a call.' : ''}
        `
      }

      text.className = 'insights-text'

      const primaryHtml = lead.date_of_birth ? `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;">

      loadConversation(); loadTasks(); loadDispositionHistory(); loadLeadAppointments()
      toast.info('Sold status removed', `${name} moved back to ${data.lead.status}`)
    } catch (err) { toast.error('Error', err.message || 'Could not remove sold status') }
  }
</script>

<!-- MARK AS SOLD MODAL (lead profile) -->
<div style="display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:100000;align-items:center;justify-content:center;padding:20px;" id="lp-sold-modal" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--bg-card);border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px var(--modal-shadow);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div style="font-size:17px;font-weight:700;color:var(--text-primary);" id="lp-sold-modal-title">Mark as Sold</div>
      <button onclick="document.getElementById('lp-sold-modal').style.display='none'" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;">×</button>
    </div>
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;">Product Sold</label>
      <input type="text" id="lp-sold-plan-type" placeholder="e.g. UHC PPO $245/mo, Term Life $500k, 6kW Solar System..." style="width:100%;padding:8px 12px;border:1px solid var(--input-border);border-radius:8px;font-size:13px;outline:none;background:var(--input-bg);color:var(--input-text);">
    </div>
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;">Expected Commission</label>
      <div style="position:relative;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;">$</span>
        <input type="number" id="lp-sold-commission" placeholder="0.00" step="0.01" min="0" style="width:100%;padding:8px 12px 8px 26px;border:1px solid var(--input-border);border-radius:8px;font-size:13px;outline:none;background:var(--input-bg);color:var(--input-text);">
      </div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;">Monthly Premium</label>
      <div style="position:relative;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;">$</span>
        <input type="number" id="lp-sold-premium" placeholder="0.00" step="0.01" min="0" style="width:100%;padding:8px 12px 8px 26px;border:1px solid var(--input-border);border-radius:8px;font-size:13px;outline:none;background:var(--input-bg);color:var(--input-text);">
      </div>
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;">Notes</label>
      <textarea id="lp-sold-notes" placeholder="Any additional details about the sale" rows="3" style="width:100%;padding:8px 12px;border:1px solid var(--input-border);border-radius:8px;font-size:13px;font-family:inherit;resize:none;outline:none;background:var(--input-bg);color:var(--input-text);"></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="document.getElementById('lp-sold-modal').style.display='none'" style="padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg-hover);color:var(--text-secondary);border:none;">Cancel</button>
      <button onclick="submitMarkSold()" style="padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#10b981;color:white;border:none;">Mark as Sold</button>
    </div>
  </div>
</div>

<!-- BOOK APPOINTMENT MODAL (lead profile) -->
<div style="display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:100000;align-items:center;justify-content:center;padding:20px;" id="lp-book-appt-modal" onclick="if(event.target===this)this.style.display='none'">

      <button onclick="document.getElementById('lp-book-appt-modal').style.display='none'" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;">×</button>

    </div>
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;">Notes (optional)</label>

    </div>
    <div id="lp-book-appt-existing" style="display:none;margin-bottom:12px;padding:10px 12px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:8px;font-size:12.5px;color:#fbbf24;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="document.getElementById('lp-book-appt-modal').style.display='none'" style="padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg-hover);color:var(--text-secondary);border:none;">Cancel</button>
      <button onclick="submitBookAppt()" style="padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:linear-gradient(135deg, #00c9a7, #0ea5e9);color:#0b0f12;border:none;">Book Appointment</button>
    </div>
  </div>
</div>

<script>renderSidebar('leads')</script>
