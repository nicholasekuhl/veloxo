<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Veloxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #f0f0f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .logo span { color: #6366f1; }
    .sub { font-size: 13px; color: #9ca3af; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6366f1; }
    .btn { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 4px; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #c7d2fe; cursor: not-allowed; }
    .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .inline-error { color: #dc2626; font-size: 12px; margin-top: 4px; }
    .hidden { display: none; }
    .success-box { background: #d1fae5; color: #065f46; padding: 16px; border-radius: 8px; font-size: 14px; text-align: center; line-height: 1.5; }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
    .back-link a { color: #6366f1; cursor: pointer; text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Text<span>App</span></div>
    <div class="sub">Set a new password for your account</div>
    <div class="error" id="error-msg"></div>

    <div id="reset-fields">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" oninput="checkMatch()">
        <div class="inline-error hidden" id="pwd-mismatch">Passwords do not match</div>
      </div>
      <button class="btn" id="reset-btn" onclick="resetPassword()">Set New Password</button>
    </div>

    <div id="reset-success" class="success-box hidden">
      Password updated! Redirecting to sign in...
    </div>

    <div class="back-link" id="back-link">
      <a href="/login.html">Back to sign in</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search)
    const tokenHash = urlParams.get('token_hash')
    const type = urlParams.get('type')

    if (!tokenHash || type !== 'recovery') {
      const errEl = document.getElementById('error-msg')
      errEl.textContent = 'Invalid or expired reset link. Please request a new one.'
      errEl.style.display = 'block'
      document.getElementById('reset-fields').classList.add('hidden')
    }

    const checkMatch = () => {
      const pwd = document.getElementById('new-password').value
      const confirm = document.getElementById('confirm-password').value
      const mismatch = document.getElementById('pwd-mismatch')
      if (confirm && pwd !== confirm) mismatch.classList.remove('hidden')
      else mismatch.classList.add('hidden')
    }

    const resetPassword = async () => {
      const password = document.getElementById('new-password').value
      const confirm = document.getElementById('confirm-password').value
      const btn = document.getElementById('reset-btn')
      const errEl = document.getElementById('error-msg')

      if (!password) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; return }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Updating...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token_hash: tokenHash, password })
        })
        const data = await res.json()
        if (data.success) {
          document.getElementById('reset-fields').classList.add('hidden')
          document.getElementById('reset-success').classList.remove('hidden')
          document.getElementById('back-link').classList.add('hidden')
          setTimeout(() => { window.location.href = '/login.html' }, 2000)
        } else {
          errEl.textContent = data.error || 'Something went wrong.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Set New Password'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Set New Password'
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') resetPassword()
    })
  </script>
</body>
</html>
