<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Veloxo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #08080f;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* Logo */
    .login-logo {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .login-logo-mark {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #00c9a7, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 14px rgba(0,201,167,0.4);
      flex-shrink: 0;
    }
    .login-logo-text {
      font-size: 20px; font-weight: 700;
      letter-spacing: -0.5px; color: var(--text-primary);
    }
    .login-logo-velox { color: #00d4b4; }

    /* Welcome text */
    .sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 28px;
      margin-top: 0;
    }

    /* Labels */
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    /* Inputs */
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: rgba(0,201,167,0.4);
      background: rgba(0,201,167,0.04);
    }
    input::placeholder { color: var(--input-placeholder); }

    /* Sign In / action buttons */
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00c9a7, #0ea5e9);
      color: #08080f;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(0,201,167,0.35);
      transition: all 0.15s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn:hover { box-shadow: 0 4px 24px rgba(0,201,167,0.5); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Error box */
    .error {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.25);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .inline-error { color: #fca5a5; font-size: 12px; margin-top: 4px; }

    /* Forgot password link */
    a[onclick*="showForgot"] {
      font-size: 12px;
      color: #00d4b4;
      text-decoration: none;
    }
    a[onclick*="showForgot"]:hover { color: #00c9a7; }

    /* Toggle / sign-up links */
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .toggle-link a { color: #00d4b4; cursor: pointer; text-decoration: none; font-weight: 500; }
    .toggle-link a:hover { color: #00c9a7; }

    /* Utilities */
    .hidden { display: none; }
    .form-group { margin-bottom: 16px; }
    .success-box { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); padding: 16px; border-radius: 8px; font-size: 14px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 36 36" fill="none" width="18" height="18">
          <path d="M8 10L14 18L8 26" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
          <path d="M15 10L23 18L15 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 10L29 18L21 26" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        </svg>
      </div>
      <span class="login-logo-text"><span class="login-logo-velox">velox</span>o</span>
    </div>
    <div class="sub" id="sub-text">Welcome back</div>
    <div class="error" id="error-msg"></div>

    <!-- Sign In form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <label style="margin-bottom:0;">Password</label>
          <a onclick="showForgot()" style="font-size:12px;color:#a89cf9;cursor:pointer;text-decoration:none;">Forgot password?</a>
        </div>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    </div>

    <!-- Forgot Password form -->
    <div id="forgot-form" class="hidden">
      <div id="forgot-success" class="success-box hidden"></div>
      <div id="forgot-fields">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn" id="forgot-btn" onclick="forgotPassword()">Send Reset Link</button>
      </div>
    </div>

    <!-- Create Account form -->
    <div id="signup-form" class="hidden">
      <div id="signup-success" class="success-box hidden"></div>
      <div id="signup-fields">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="signup-name" placeholder="Your Name" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkPasswordMatch()">
          <div class="inline-error hidden" id="pwd-mismatch">Passwords do not match</div>
        </div>
        <button class="btn" id="signup-btn" onclick="signup()">Create Account</button>
      </div>
    </div>

    <div class="toggle-link hidden" id="toggle-login"></div>
    <div class="toggle-link hidden" id="toggle-signup">
      Already have an account? <a onclick="showLogin()">Sign in</a>
    </div>
    <div class="toggle-link hidden" id="toggle-forgot">
      <a onclick="showLogin()">Back to sign in</a>
    </div>
  </div>

  <script>
    fetch('/auth/me').then(r => { if (r.ok) window.location.href = '/leads.html' })

    // Show verification error from callback redirect
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('verified') === 'failed') {
      const errEl = document.getElementById('error-msg')
      errEl.textContent = 'Email verification failed or link expired. Please try signing up again.'
      errEl.style.display = 'block'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!document.getElementById('signup-form').classList.contains('hidden')) signup()
        else login()
      }
    })

    const showSignup = () => {
      document.getElementById('login-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.add('hidden')
      document.getElementById('signup-form').classList.remove('hidden')
      document.getElementById('toggle-login').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.add('hidden')
      document.getElementById('toggle-signup').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Create your account'
      document.getElementById('error-msg').style.display = 'none'
    }

    const showLogin = () => {
      document.getElementById('signup-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.add('hidden')
      document.getElementById('login-form').classList.remove('hidden')
      document.getElementById('toggle-signup').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.add('hidden')
      document.getElementById('toggle-login').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Welcome back'
      document.getElementById('error-msg').style.display = 'none'
    }

    const showForgot = () => {
      document.getElementById('login-form').classList.add('hidden')
      document.getElementById('signup-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.remove('hidden')
      document.getElementById('toggle-login').classList.add('hidden')
      document.getElementById('toggle-signup').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Reset your password'
      document.getElementById('error-msg').style.display = 'none'
    }

    const login = async () => {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      const btn = document.getElementById('login-btn')
      const errEl = document.getElementById('error-msg')

      if (!email || !password) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Signing in...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
        const data = await res.json()
        if (data.success) {
          window.location.href = '/leads.html'
        } else {
          errEl.textContent = data.error || 'Login failed.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Sign In'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    }

    const forgotPassword = async () => {
      const email = document.getElementById('forgot-email').value.trim()
      const btn = document.getElementById('forgot-btn')
      const errEl = document.getElementById('error-msg')

      if (!email) { errEl.textContent = 'Email is required.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Sending...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) })
        const data = await res.json()
        if (data.success) {
          document.getElementById('forgot-fields').classList.add('hidden')
          const successEl = document.getElementById('forgot-success')
          successEl.textContent = 'Check your email for a password reset link.'
          successEl.classList.remove('hidden')
          document.getElementById('toggle-forgot').classList.add('hidden')
        } else {
          errEl.textContent = data.error || 'Something went wrong.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Send Reset Link'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      }
    }

    const checkPasswordMatch = () => {
      const pwd = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      const mismatch = document.getElementById('pwd-mismatch')
      if (confirm && pwd !== confirm) mismatch.classList.remove('hidden')
      else mismatch.classList.add('hidden')
    }

    const signup = async () => {
      const agent_name = document.getElementById('signup-name').value.trim()
      const email = document.getElementById('signup-email').value.trim()
      const password = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      const btn = document.getElementById('signup-btn')
      const errEl = document.getElementById('error-msg')

      if (!email || !password) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Creating account...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, agent_name }) })
        const data = await res.json()
        if (data.success && data.needsVerification) {
          document.getElementById('signup-fields').classList.add('hidden')
          const successEl = document.getElementById('signup-success')
          successEl.textContent = 'Check your email to verify your account before logging in.'
          successEl.classList.remove('hidden')
          document.getElementById('toggle-signup').classList.add('hidden')
        } else if (data.success) {
          window.location.href = '/leads.html'
        } else {
          errEl.textContent = data.error || 'Signup failed.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create Account'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Create Account'
      }
    }
  </script>
</body>
</html>
