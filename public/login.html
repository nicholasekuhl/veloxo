<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Veloxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: #f4f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
    .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #ebebf0; box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04); }
    .logo { font-size: 24px; font-weight: 750; color: #1a1a2e; margin-bottom: 4px; letter-spacing: -0.6px; }
    .logo span { color: #6366f1; }
    .sub { font-size: 13px; color: #9ca3af; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; color: #1a1a2e; }
    input:focus { border-color: #818cf8; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .btn { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, box-shadow 0.15s, transform 0.15s; margin-top: 4px; letter-spacing: -0.01em; }
    .btn:hover { background: #4f46e5; box-shadow: 0 2px 8px rgba(99,102,241,0.3); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: #c7d2fe; cursor: not-allowed; box-shadow: none; transform: none; }
    .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .toggle-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
    .toggle-link a { color: #6366f1; cursor: pointer; text-decoration: none; font-weight: 500; }
    .toggle-link a:hover { text-decoration: underline; }
    .hidden { display: none; }
    .inline-error { color: #dc2626; font-size: 12px; margin-top: 4px; }
    .success-box { background: #d1fae5; color: #065f46; padding: 16px; border-radius: 8px; font-size: 14px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Text<span>App</span></div>
    <div class="sub" id="sub-text">Sign in to your account</div>
    <div class="error" id="error-msg"></div>

    <!-- Sign In form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <label style="margin-bottom:0;">Password</label>
          <a onclick="showForgot()" style="font-size:12px;color:#6366f1;cursor:pointer;text-decoration:none;">Forgot password?</a>
        </div>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    </div>

    <!-- Forgot Password form -->
    <div id="forgot-form" class="hidden">
      <div id="forgot-success" class="success-box hidden"></div>
      <div id="forgot-fields">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn" id="forgot-btn" onclick="forgotPassword()">Send Reset Link</button>
      </div>
    </div>

    <!-- Create Account form -->
    <div id="signup-form" class="hidden">
      <div id="signup-success" class="success-box hidden"></div>
      <div id="signup-fields">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="signup-name" placeholder="Your Name" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkPasswordMatch()">
          <div class="inline-error hidden" id="pwd-mismatch">Passwords do not match</div>
        </div>
        <button class="btn" id="signup-btn" onclick="signup()">Create Account</button>
      </div>
    </div>

    <div class="toggle-link" id="toggle-login">
      Don't have an account? <a onclick="showSignup()">Create one</a>
    </div>
    <div class="toggle-link hidden" id="toggle-signup">
      Already have an account? <a onclick="showLogin()">Sign in</a>
    </div>
    <div class="toggle-link hidden" id="toggle-forgot">
      <a onclick="showLogin()">Back to sign in</a>
    </div>
  </div>

  <script>
    fetch('/auth/me').then(r => { if (r.ok) window.location.href = '/' })

    // Show verification error from callback redirect
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('verified') === 'failed') {
      const errEl = document.getElementById('error-msg')
      errEl.textContent = 'Email verification failed or link expired. Please try signing up again.'
      errEl.style.display = 'block'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!document.getElementById('signup-form').classList.contains('hidden')) signup()
        else login()
      }
    })

    const showSignup = () => {
      document.getElementById('login-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.add('hidden')
      document.getElementById('signup-form').classList.remove('hidden')
      document.getElementById('toggle-login').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.add('hidden')
      document.getElementById('toggle-signup').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Create your account'
      document.getElementById('error-msg').style.display = 'none'
    }

    const showLogin = () => {
      document.getElementById('signup-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.add('hidden')
      document.getElementById('login-form').classList.remove('hidden')
      document.getElementById('toggle-signup').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.add('hidden')
      document.getElementById('toggle-login').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Sign in to your account'
      document.getElementById('error-msg').style.display = 'none'
    }

    const showForgot = () => {
      document.getElementById('login-form').classList.add('hidden')
      document.getElementById('signup-form').classList.add('hidden')
      document.getElementById('forgot-form').classList.remove('hidden')
      document.getElementById('toggle-login').classList.add('hidden')
      document.getElementById('toggle-signup').classList.add('hidden')
      document.getElementById('toggle-forgot').classList.remove('hidden')
      document.getElementById('sub-text').textContent = 'Reset your password'
      document.getElementById('error-msg').style.display = 'none'
    }

    const login = async () => {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      const btn = document.getElementById('login-btn')
      const errEl = document.getElementById('error-msg')

      if (!email || !password) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Signing in...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
        const data = await res.json()
        if (data.success) {
          window.location.href = '/'
        } else {
          errEl.textContent = data.error || 'Login failed.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Sign In'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    }

    const forgotPassword = async () => {
      const email = document.getElementById('forgot-email').value.trim()
      const btn = document.getElementById('forgot-btn')
      const errEl = document.getElementById('error-msg')

      if (!email) { errEl.textContent = 'Email is required.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Sending...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) })
        const data = await res.json()
        if (data.success) {
          document.getElementById('forgot-fields').classList.add('hidden')
          const successEl = document.getElementById('forgot-success')
          successEl.textContent = 'Check your email for a password reset link.'
          successEl.classList.remove('hidden')
          document.getElementById('toggle-forgot').classList.add('hidden')
        } else {
          errEl.textContent = data.error || 'Something went wrong.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Send Reset Link'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      }
    }

    const checkPasswordMatch = () => {
      const pwd = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      const mismatch = document.getElementById('pwd-mismatch')
      if (confirm && pwd !== confirm) mismatch.classList.remove('hidden')
      else mismatch.classList.add('hidden')
    }

    const signup = async () => {
      const agent_name = document.getElementById('signup-name').value.trim()
      const email = document.getElementById('signup-email').value.trim()
      const password = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      const btn = document.getElementById('signup-btn')
      const errEl = document.getElementById('error-msg')

      if (!email || !password) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Creating account...'
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, agent_name }) })
        const data = await res.json()
        if (data.success && data.needsVerification) {
          document.getElementById('signup-fields').classList.add('hidden')
          const successEl = document.getElementById('signup-success')
          successEl.textContent = 'Check your email to verify your account before logging in.'
          successEl.classList.remove('hidden')
          document.getElementById('toggle-signup').classList.add('hidden')
        } else if (data.success) {
          window.location.href = '/'
        } else {
          errEl.textContent = data.error || 'Signup failed.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create Account'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Create Account'
      }
    }
  </script>
</body>
</html>
