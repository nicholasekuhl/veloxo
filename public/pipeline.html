<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline — Veloxo</title>
  <link rel="stylesheet" href="/css/shared.css?v=2">
  <style>
    .pipeline-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; margin-left: 212px; }
    .pipeline-header { padding: 15px 20px 0; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(11,15,18,0.95); backdrop-filter: blur(8px); }
    .pipeline-title-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .pipeline-title-row h1 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
    .pipeline-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
    .pipeline-filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; padding-bottom: 12px; }
    .pf-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.15s; }
    .pf-pill:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); }
    .pf-pill.active { background: linear-gradient(135deg, #00c9a7, #0ea5e9); border-color: transparent; color: #0b0f12; font-weight: 600; }
    .pf-custom-dates { display: none; align-items: center; gap: 6px; }
    .pf-custom-dates.visible { display: flex; }
    .pf-custom-dates input { padding: 4px 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 12px; outline: none; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }
    .pf-custom-dates input:focus { border-color: rgba(0,201,167,0.4); }
    .pipeline-total { font-size: 12px; color: rgba(255,255,255,0.3); margin-left: auto; }
    .kanban-scroll-wrapper { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 16px 20px 24px; }
    .kanban-board { display: flex; gap: 12px; height: 100%; min-width: max-content; }
    .kanban-col { width: 240px; flex-shrink: 0; display: flex; flex-direction: column; background: #131a1f; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); overflow: hidden; }
    .kanban-col-header { padding: 12px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: rgba(255,255,255,0.02); }
    .kanban-col-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); }
    .kanban-col-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; color: rgba(11,15,18,0.9); }
    .kanban-col-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .kanban-col-body.drag-over { background: rgba(0,201,167,0.06); outline: 2px dashed rgba(0,201,167,0.4); outline-offset: -2px; }
    .pipeline-card { background: #1a2228; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); padding: 10px 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .pipeline-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
    .pipeline-card.ghosted { opacity: 0.55; border-left: 3px solid #f59e0b; }
    .pipeline-card.dragging { opacity: 0.4; }
    .pc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .pc-avatar { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #374151, #1f2937); color: rgba(255,255,255,0.7); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pc-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-meta { font-size: 11px; color: rgba(255,255,255,0.35); display: flex; flex-wrap: wrap; gap: 4px 10px; margin-bottom: 4px; }
    .pc-time { font-size: 10px; color: rgba(255,255,255,0.28); margin-bottom: 4px; }
    .pc-preview { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ghosted-section-label { font-size: 10px; font-weight: 700; color: #f59e0b; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 4px 2px; margin-top: 6px; border-top: 1px dashed rgba(245,158,11,0.3); }
    .kanban-empty { text-align: center; padding: 20px 8px; color: rgba(255,255,255,0.22); font-size: 12px; }
    .pipeline-loading { text-align: center; padding: 80px 24px; color: rgba(255,255,255,0.28); font-size: 14px; }
  </style>
  <script src="/toast.js?v=2"></script>
</head>
<body>

<div id="sidebar-root"></div>
<div class="pipeline-container">

  <div class="pipeline-header">
    <div class="pipeline-title-row">
      <h1>Pipeline</h1>
    </div>
    <div class="pipeline-subtitle">Lead qualification stages</div>
    <div class="pipeline-filter-bar">
      <button class="pf-pill" data-range="today" onclick="setRange('today', this)">Today</button>
      <button class="pf-pill" data-range="7d" onclick="setRange('7d', this)">7 Days</button>
      <button class="pf-pill active" data-range="30d" onclick="setRange('30d', this)">30 Days</button>
      <button class="pf-pill" data-range="60d" onclick="setRange('60d', this)">60 Days</button>
      <button class="pf-pill" data-range="90d" onclick="setRange('90d', this)">90 Days</button>
      <button class="pf-pill" data-range="custom" onclick="setRange('custom', this)">Custom</button>
      <div class="pf-custom-dates" id="custom-dates">
        <input type="date" id="custom-from" onchange="loadPipeline()">
        <span style="font-size:12px;color:rgba(255,255,255,0.3);">to</span>
        <input type="date" id="custom-to" onchange="loadPipeline()">
      </div>
      <span class="pipeline-total" id="pipeline-total"></span>
    </div>
  </div>

  <div class="kanban-scroll-wrapper">
    <div class="kanban-board" id="kanban-board">
      <div class="pipeline-loading">Loading pipeline...</div>
    </div>
  </div>

</div>

<script src="/js/shared.js?v=2"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────

const STAGES = [
  { key: 'replied',               label: 'Replied',   color: '#6366f1' },
  { key: 'household_confirmed',   label: 'Household', color: '#3b82f6' },
  { key: 'income_provided',       label: 'Income',    color: '#0ea5e9' },
  { key: 'medical_shared',        label: 'Medical',   color: '#8b5cf6' },
  { key: 'budget_provided',       label: 'Budget',    color: '#f59e0b' },
  { key: 'appointment_scheduled', label: 'Appt Set',  color: '#10b981' },
  { key: 'sold',                  label: 'Sold',      color: '#22c55e' }
]

let currentRange = '30d'
let dragLeadId = null
let dragFromStage = null

// ─── RANGE FILTER ─────────────────────────────────────────────────────────────

const setRange = (range, btn) => {
  currentRange = range
  document.querySelectorAll('.pf-pill').forEach(p => p.classList.remove('active'))
  btn.classList.add('active')
  const customDates = document.getElementById('custom-dates')
  if (range === 'custom') {
    customDates.classList.add('visible')
    return
  }
  customDates.classList.remove('visible')
  loadPipeline()
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────

const loadPipeline = async () => {
  const board = document.getElementById('kanban-board')
  board.innerHTML = '<div class="pipeline-loading">Loading pipeline...</div>'

  try {
    let url = `/leads/pipeline?range=${currentRange}`
    if (currentRange === 'custom') {
      const from = document.getElementById('custom-from').value
      const to = document.getElementById('custom-to').value
      if (!from) return
      url += `&from=${from}`
      if (to) url += `&to=${to}`
    }

    const res = await fetch(url)
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Failed to load pipeline')

    renderBoard(data)
  } catch (err) {
    board.innerHTML = `<div class="pipeline-loading" style="color:var(--color-danger);">Could not load pipeline: ${err.message}</div>`
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

const renderBoard = (data) => {
  const board = document.getElementById('kanban-board')
  const total = data.total || 0
  document.getElementById('pipeline-total').textContent = total ? `${total} lead${total !== 1 ? 's' : ''} in pipeline` : ''

  board.innerHTML = STAGES.map(stage => {
    const leads = data.stages[stage.key] || []
    const active = leads.filter(l => !l.pipeline_ghosted)
    const ghosted = leads.filter(l => l.pipeline_ghosted)

    const activeCards = active.length
      ? active.map(l => renderCard(l, stage.key)).join('')
      : `<div class="kanban-empty">No leads</div>`

    const ghostedSection = ghosted.length ? `
      <div class="ghosted-section-label">Ghosted (${ghosted.length})</div>
      ${ghosted.map(l => renderCard(l, stage.key)).join('')}
    ` : ''

    return `
      <div class="kanban-col" id="col-${stage.key}">
        <div class="kanban-col-header">
          <span class="kanban-col-name" style="color:${stage.color};">${stage.label}</span>
          <span class="kanban-col-count" style="background:${stage.color};">${leads.length}</span>
        </div>
        <div class="kanban-col-body"
          id="body-${stage.key}"
          data-stage="${stage.key}"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event, '${stage.key}')">
          ${activeCards}
          ${ghostedSection}
        </div>
      </div>
    `
  }).join('')
}

const renderCard = (lead, stageKey) => {
  const first = lead.first_name || ''
  const last = lead.last_name || ''
  const name = [first, last].filter(Boolean).join(' ') || 'Unknown'
  const initials = ((first[0] || '') + (last[0] || '')).toUpperCase() || '?'
  const location = [lead.state, lead.zip_code].filter(Boolean).join(' ')
  const preview = lead.last_message ? lead.last_message.slice(0, 40) + (lead.last_message.length > 40 ? '…' : '') : ''
  const timeLabel = lead.pipeline_stage_set_at ? timeAgo(lead.pipeline_stage_set_at) : ''
  const ghosted = lead.pipeline_ghosted

  return `
    <div class="pipeline-card${ghosted ? ' ghosted' : ''}"
      draggable="true"
      data-id="${lead.id}"
      data-stage="${stageKey}"
      ondragstart="onDragStart(event, '${lead.id}', '${stageKey}')"
      ondragend="onDragEnd(event)"
      onclick="goToConversation('${lead.id}')"
      title="${ghosted ? 'Ghosted — no reply since stage was set' : ''}">
      <div class="pc-top">
        <div class="pc-avatar">${initials}</div>
        <div class="pc-name" title="${name}">${name}</div>
      </div>
      <div class="pc-meta">
        <span>${lead.phone || ''}</span>
        ${location ? `<span>📍 ${location}</span>` : ''}
      </div>
      ${timeLabel ? `<div class="pc-time">${timeLabel}</div>` : ''}
      ${preview ? `<div class="pc-preview">${preview}</div>` : ''}
    </div>
  `
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────

const goToConversation = (leadId) => {
  window.location.href = `/conversations.html?lead=${leadId}`
}

// ─── DRAG AND DROP ────────────────────────────────────────────────────────────

const onDragStart = (e, leadId, fromStage) => {
  dragLeadId = leadId
  dragFromStage = fromStage
  e.currentTarget.classList.add('dragging')
  e.dataTransfer.effectAllowed = 'move'
}

const onDragEnd = (e) => {
  e.currentTarget.classList.remove('dragging')
  document.querySelectorAll('.kanban-col-body').forEach(b => b.classList.remove('drag-over'))
}

const onDragOver = (e) => {
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
  e.currentTarget.classList.add('drag-over')
}

const onDragLeave = (e) => {
  e.currentTarget.classList.remove('drag-over')
}

const onDrop = async (e, toStage) => {
  e.preventDefault()
  e.currentTarget.classList.remove('drag-over')

  if (!dragLeadId || toStage === dragFromStage) return

  try {
    const res = await fetch(`/leads/${dragLeadId}/pipeline-stage`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipeline_stage: toStage })
    })
    if (!res.ok) {
      const d = await res.json()
      toast.error('Could not move lead', d.error || 'Unknown error')
      return
    }
    loadPipeline()
  } catch (err) {
    toast.error('Error', err.message)
  }

  dragLeadId = null
  dragFromStage = null
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  const authed = await checkAuth()
  if (!authed) return
  loadProfile()
  loadNotifBadge()
  loadCalBadge()
  loadPipeline()
})
</script>
</body>
</html>
