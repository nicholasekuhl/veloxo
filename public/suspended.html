<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Suspended — Veloxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; border: 1px solid #f0f0f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); text-align: center; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: inline-block; padding: 11px 24px; background: #f3f4f6; color: #374151; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; }
    .btn:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h2>Account Suspended</h2>
    <p>Your account has been suspended. Please contact support for assistance.</p>
    <a href="/login.html" class="btn">Back to Login</a>
  </div>
</body>
</html>
