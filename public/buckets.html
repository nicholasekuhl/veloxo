<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='18' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300c9a7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M10 10L16 18L10 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3Cpath d='M16 10L24 18L16 26' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M22 10L28 18L22 26' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buckets — Veloxo</title>
  <link rel="stylesheet" href="/css/shared.css?v=2">
  <style>
    .buckets-layout { display:flex; height:100vh; overflow:hidden; }
    .buckets-sidebar { width:260px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg-sidebar); overflow:hidden; }
    .buckets-sidebar-header { padding:12px; border-bottom:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
    .buckets-tree-scroll { flex:1; overflow-y:auto; padding:8px; }
    .buckets-main { flex:1; overflow-y:auto; padding:24px; background:var(--bg-base); }
    .buckets-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--text-muted); font-size:14px; gap:8px; }

    /* ── Folder rows ── */
    .tree-folder { display:flex; align-items:center; gap:6px; padding:7px 10px; cursor:pointer; border-radius:7px; font-size:13px; font-weight:700; color:var(--input-text); transition:background 0.12s; user-select:none; margin-bottom:1px; }
    .tree-folder:hover { background:var(--input-bg); }
    .tree-folder.selected { background:rgba(0,201,167,0.12); color:#00d4b4; }
    .tree-folder.drag-over { outline:2px dashed rgba(0,201,167,0.5); background:rgba(0,201,167,0.06); }
    .tree-folder.dragging { opacity:0.45; }
    .tree-folder.depth-1 { padding-left:16px; font-weight:600; font-size:13px; }
    .tree-folder[draggable="true"] { cursor:grab; }
    .tree-folder[draggable="true"]:active { cursor:grabbing; }
    .tree-chevron { font-size:10px; color:var(--text-muted); transition:transform 0.15s; flex-shrink:0; display:inline-block; width:10px; }
    .tree-chevron.open { transform:rotate(90deg); }
    .folder-badge { background:var(--bg-active); color:var(--text-muted); border-radius:20px; padding:1px 7px; font-size:11px; font-weight:600; flex-shrink:0; }

    /* ── Bucket rows ── */
    .tree-bucket { display:flex; align-items:center; gap:7px; padding:6px 10px 6px 22px; cursor:pointer; border-radius:7px; font-size:13px; color:var(--text-secondary); transition:background 0.12s; user-select:none; margin-bottom:1px; }
    .tree-bucket.toplevel { padding-left:10px; }
    .tree-bucket.depth-1 { padding-left:22px; }
    .tree-bucket.depth-2 { padding-left:32px; }
    .tree-bucket:hover { background:var(--bg-hover); }
    .tree-bucket:hover .drag-handle { opacity:1; }
    .tree-bucket.selected { background:rgba(0,201,167,0.12); color:#00d4b4; }
    .tree-bucket.dragging { opacity:0.45; }
    .drag-handle { font-size:13px; color:var(--text-disabled); opacity:0; cursor:grab; flex-shrink:0; width:14px; text-align:center; }
    .bucket-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .tree-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-lead-count { font-size:11px; color:var(--text-muted); flex-shrink:0; white-space:nowrap; }

    /* ── Archive section ── */
    .archive-section { border-top:1px solid var(--border); flex-shrink:0; }
    .archive-toggle { display:flex; align-items:center; gap:6px; padding:9px 12px; cursor:pointer; font-size:12px; font-weight:600; color:var(--text-muted); user-select:none; transition:background 0.12s; }
    .archive-toggle:hover { background:var(--bg-hover); }
    .archive-toggle-chevron { font-size:9px; margin-left:auto; transition:transform 0.15s; }
    .archive-toggle-chevron.open { transform:rotate(90deg); }
    .archive-list { padding:4px 8px 8px; max-height:220px; overflow-y:auto; }
    .archive-item { display:flex; align-items:center; gap:7px; padding:5px 8px; border-radius:7px; font-size:12px; color:var(--text-muted); }
    .archive-item-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .archive-restore-btn { font-size:11px; color:#00d4b4; background:none; border:none; cursor:pointer; padding:1px 4px; border-radius:4px; white-space:nowrap; flex-shrink:0; }
    .archive-restore-btn:hover { background:rgba(0,201,167,0.12); }

    /* ── Context menu ── */
    #bucket-ctx-menu { position:fixed; background:var(--bg-elevated); border:1px solid var(--input-border); border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:1000; min-width:160px; overflow:hidden; display:none; }
    .ctx-item { display:flex; align-items:center; gap:8px; padding:8px 14px; font-size:13px; color:var(--text-secondary); cursor:pointer; transition:background 0.1s; }
    .ctx-item:hover { background:var(--input-bg); }
    .ctx-item.danger { color:#f87171; }
    .ctx-item.danger:hover { background:rgba(239,68,68,0.08); }
    .ctx-divider { height:1px; background:var(--border); margin:2px 0; }

    /* ── Detail panel ── */
    .detail-card { background:var(--bg-card); border:1px solid var(--bg-active); border-radius:11px; padding:24px; max-width:520px; }
    .detail-title { font-size:17px; font-weight:700; margin-bottom:20px; color:var(--text-primary); }
    .color-swatches { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:border-color 0.15s, transform 0.1s; }
    .color-swatch:hover { transform:scale(1.1); }
    .color-swatch.selected { border-color:var(--text-primary); }
    .section-divider { height:1px; background:var(--bg-active); margin:16px 0; }
    .bucket-child-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-secondary); }
    .bucket-child-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
<div id="sidebar-root"></div>

<!-- Context menu -->
<div id="bucket-ctx-menu">
  <div class="ctx-item" id="ctx-rename" onclick="ctxRename()">✏️ Rename</div>
  <div class="ctx-item" id="ctx-archive" onclick="ctxArchive()">📦 Archive</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctx-delete" onclick="ctxDelete()">🗑 Delete</div>
</div>

<div class="main-content">
  <div class="buckets-layout">
    <div class="buckets-sidebar">
      <div class="buckets-sidebar-header">
        <button class="btn-ghost" style="flex:1;padding:6px 8px;" onclick="openNewFolderModal()" title="Folders organize buckets. They cannot hold leads directly.">📂 + Folder</button>
        <button class="btn-primary" style="flex:1;padding:6px 8px;" onclick="openNewBucketModal()">● + Bucket</button>
      </div>
      <div class="buckets-tree-scroll" id="bucket-tree"></div>
      <div class="archive-section" id="archive-section">
        <div class="archive-toggle" id="archive-toggle" onclick="toggleArchiveSection()">
          <span>📦</span>
          <span id="archive-toggle-label">Archive</span>
          <span class="archive-toggle-chevron" id="archive-toggle-chevron">▶</span>
        </div>
        <div class="archive-list" id="archive-list" style="display:none;"></div>
      </div>
    </div>
    <div class="buckets-main">
      <div id="bucket-detail">
        <div class="buckets-empty">
          <div style="font-size:32px;">📂</div>
          <div>Select a bucket or folder to view details</div>
        </div>
      </div>
    </div>
  </div>
</div><!-- .main-content -->

<!-- NEW FOLDER MODAL -->
<div class="modal-overlay" id="new-folder-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2 id="new-folder-modal-title">New Folder</h2>
      <button class="modal-close" onclick="closeNewFolderModal()">×</button>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin:0 0 16px;" id="new-folder-modal-hint">Folders organize buckets into groups. Leads are stored in buckets, not folders.</p>
    <div class="form-group">
      <label>Folder Name</label>
      <input type="text" id="new-folder-name" placeholder="e.g. March Imports, Bulk Leads..." onkeydown="if(event.key==='Enter')saveNewFolder()">
    </div>
    <div class="form-group" id="new-folder-parent-group" style="display:none;">
      <label>Inside Folder</label>
      <select id="new-folder-parent"></select>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeNewFolderModal()">Cancel</button>
      <button class="btn-primary" onclick="saveNewFolder()">Create Folder</button>
    </div>
  </div>
</div>

<!-- NEW BUCKET MODAL -->
<div class="modal-overlay" id="new-bucket-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2 id="new-bucket-modal-title">New Bucket</h2>
      <button class="modal-close" onclick="closeNewBucketModal()">×</button>
    </div>
    <div class="form-group">
      <label>Bucket Name</label>
      <input type="text" id="new-bucket-name" placeholder="e.g. New Leads, My Bucket..." onkeydown="if(event.key==='Enter')saveNewBucket()">
    </div>
    <div class="form-group">
      <label>Add to Folder <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
      <select id="new-bucket-folder">
        <option value="">Top level (no folder)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-swatches" id="new-bucket-colors"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeNewBucketModal()">Cancel</button>
      <button class="btn-primary" onclick="saveNewBucket()">Create Bucket</button>
    </div>
  </div>
</div>

<script src="/toast.js?v=2"></script>
<script src="/js/shared.js?v=2"></script>
<script>
  const BUCKET_COLORS = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#64748b','#1a1a2e']

  let allBuckets = []
  let archivedBuckets = []
  let selectedItemId = null
  let selectedItemType = null
  let newBucketColor = BUCKET_COLORS[0]
  let archiveSectionOpen = false
  let ctxTargetId = null
  let ctxTargetType = null

  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

  // ── Folder expand/collapse (localStorage) ────────────────────────────────────
  const isFolderExpanded = (id) => {
    const v = localStorage.getItem('bucket_folder_' + id)
    return v === null ? true : v === 'true'
  }
  const setFolderExpanded = (id, val) => localStorage.setItem('bucket_folder_' + id, val)

  // ── Load ──────────────────────────────────────────────────────────────────────
  const loadBuckets = async () => {
    try {
      const [res, arRes] = await Promise.all([
        fetch('/buckets'),
        fetch('/buckets?archived=true')
      ])
      const data = await res.json()
      const arData = await arRes.json()
      allBuckets = data.buckets || []
      archivedBuckets = arData.buckets || []
      renderTree()
      renderArchiveSection()
      if (selectedItemId) renderDetail(selectedItemId, selectedItemType)
    } catch (err) {
      console.error('Failed to load buckets:', err)
      toast.error('Error', 'Failed to load buckets')
    }
  }

  // ── Tree rendering (3-level recursive) ───────────────────────────────────────
  const renderTree = () => {
    const container = document.getElementById('bucket-tree')
    if (!container) return

    // Build non-archived tree
    const active = allBuckets // already filtered by API (is_archived=false)

    let html = ''

    // Depth-0 items (no parent)
    const depth0 = active.filter(b => !b.parent_id)
    const depth0Folders = depth0.filter(b => b.is_folder)
    const depth0Buckets = depth0.filter(b => !b.is_folder && !b.is_system)
    const sysBuckets = active.filter(b => b.is_system)

    // Depth-0 folders with recursive children
    for (const folder of depth0Folders) {
      html += renderFolderRow(folder, active, 0)
    }

    // Depth-0 buckets (top-level, non-system)
    for (const b of depth0Buckets) {
      html += renderBucketRow(b, 'toplevel')
    }

    // System buckets last — no drag handle
    for (const b of sysBuckets) {
      const bSel = selectedItemId === b.id && selectedItemType === 'bucket'
      html += `<div class="tree-bucket toplevel${bSel ? ' selected' : ''}" data-bucket-id="${b.id}"
                    onclick="selectItem('${b.id}','bucket')"
                    oncontextmenu="showCtxMenu(event,'${b.id}','bucket')">
        <span style="width:14px;flex-shrink:0;"></span>
        <span class="bucket-dot" style="background:${b.color || '#22c55e'}"></span>
        <span class="tree-name">🔒 ${esc(b.name)}</span>
        <span class="tree-lead-count">${b.lead_count ?? 0} leads</span>
      </div>`
    }

    if (!html) html = `<div style="padding:16px;font-size:13px;color:var(--text-muted);text-align:center;">No buckets yet.<br>Create one to get started.</div>`
    container.innerHTML = html
    attachDragHandlers()
  }

  const renderFolderRow = (folder, active, depth) => {
    const isSel = selectedItemId === folder.id && selectedItemType === 'folder'
    const expanded = isFolderExpanded(folder.id)
    const directChildren = active.filter(b => b.parent_id === folder.id)
    const childFolders = directChildren.filter(b => b.is_folder)
    const childBuckets = directChildren.filter(b => !b.is_folder)
    const totalDesc = countDescendants(folder.id, active)
    const depthClass = depth > 0 ? ` depth-${depth}` : ''

    let html = `<div class="tree-folder${isSel ? ' selected' : ''}${depthClass}" data-folder-id="${folder.id}" data-bucket-id="${folder.id}"
                  onclick="handleFolderClick('${folder.id}')"
                  oncontextmenu="showCtxMenu(event,'${folder.id}','folder')">
      <span class="tree-chevron${expanded ? ' open' : ''}">▶</span>
      <span>${depth === 0 ? '📁' : '📂'}</span>
      <span class="tree-name">${esc(folder.name)}</span>
      <span class="folder-badge">${totalDesc}</span>
    </div>
    <div id="fc-${folder.id}"${expanded ? '' : ' style="display:none"'}>`

    if (expanded) {
      // Depth-1 sub-folders
      for (const sf of childFolders) {
        html += renderFolderRow(sf, active, depth + 1)
      }
      // Direct child buckets
      for (const b of childBuckets) {
        html += renderBucketRow(b, depth === 0 ? 'depth-1' : 'depth-2')
      }
    }

    html += `</div>`
    return html
  }

  const renderBucketRow = (b, depthClass) => {
    const bSel = selectedItemId === b.id && selectedItemType === 'bucket'
    return `<div class="tree-bucket ${depthClass}${bSel ? ' selected' : ''}" data-bucket-id="${b.id}"
                  onclick="selectItem('${b.id}','bucket')"
                  oncontextmenu="showCtxMenu(event,'${b.id}','bucket')">
      <span class="drag-handle">⠿</span>
      <span class="bucket-dot" style="background:${b.color}"></span>
      <span class="tree-name">${esc(b.name)}</span>
      <span class="tree-lead-count">${b.lead_count ?? 0} leads</span>
    </div>`
  }

  const countDescendants = (folderId, active) => {
    const directChildren = active.filter(b => b.parent_id === folderId)
    let count = directChildren.length
    for (const c of directChildren.filter(b => b.is_folder)) {
      count += countDescendants(c.id, active)
    }
    return count
  }

  // ── Archive section ───────────────────────────────────────────────────────────
  const renderArchiveSection = () => {
    const label = document.getElementById('archive-toggle-label')
    if (label) label.textContent = `Archive (${archivedBuckets.length})`

    const list = document.getElementById('archive-list')
    if (!list) return

    if (!archivedBuckets.length) {
      list.innerHTML = `<div style="padding:8px 4px;font-size:12px;color:var(--text-muted);">No archived items</div>`
      return
    }

    list.innerHTML = archivedBuckets.map(b => {
      const icon = b.is_folder ? '📂' : '●'
      return `<div class="archive-item">
        <span style="color:${b.color || '#9ca3af'};font-size:11px;">${icon}</span>
        <span class="archive-item-name" title="${esc(b.name)}">${esc(b.name)}</span>
        <button class="archive-restore-btn" onclick="restoreItem('${b.id}')">Restore</button>
      </div>`
    }).join('')
  }

  const toggleArchiveSection = () => {
    archiveSectionOpen = !archiveSectionOpen
    const list = document.getElementById('archive-list')
    const chevron = document.getElementById('archive-toggle-chevron')
    if (list) list.style.display = archiveSectionOpen ? 'block' : 'none'
    if (chevron) chevron.classList.toggle('open', archiveSectionOpen)
  }

  const restoreItem = async (id) => {
    try {
      const res = await fetch(`/buckets/${id}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'unarchive' })
      })
      if (!res.ok) throw new Error((await res.json()).error || 'Restore failed')
      await loadBuckets()
      toast.success('Restored', 'Item moved back to active buckets')
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── Context menu ──────────────────────────────────────────────────────────────
  const showCtxMenu = (e, id, type) => {
    e.preventDefault()
    e.stopPropagation()
    ctxTargetId = id
    ctxTargetType = type
    const item = allBuckets.find(b => b.id === id)
    const menu = document.getElementById('bucket-ctx-menu')
    menu.style.display = 'block'
    menu.style.left = e.clientX + 'px'
    menu.style.top = e.clientY + 'px'
    const deleteBtn = document.getElementById('ctx-delete')
    if (item?.is_system) deleteBtn.style.display = 'none'
    else deleteBtn.style.display = ''
    const archiveBtn = document.getElementById('ctx-archive')
    if (item?.is_system) archiveBtn.style.display = 'none'
    else archiveBtn.style.display = ''
  }

  const hideCtxMenu = () => {
    document.getElementById('bucket-ctx-menu').style.display = 'none'
    ctxTargetId = null
    ctxTargetType = null
  }

  const ctxRename = () => {
    if (!ctxTargetId) return
    selectItem(ctxTargetId, ctxTargetType)
    hideCtxMenu()
    setTimeout(() => document.getElementById('detail-name')?.focus(), 100)
  }

  const ctxArchive = async () => {
    const id = ctxTargetId
    const type = ctxTargetType
    hideCtxMenu()
    if (!id) return
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    if (!confirm(`Archive "${item.name}"?\n\nThis will hide it and all its contents from the main view. You can restore it from the Archive section.`)) return
    try {
      const res = await fetch(`/buckets/${id}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'archive' })
      })
      if (!res.ok) throw new Error((await res.json()).error || 'Archive failed')
      if (selectedItemId === id) {
        selectedItemId = null
        selectedItemType = null
        document.getElementById('bucket-detail').innerHTML = `<div class="buckets-empty"><div style="font-size:32px;">📂</div><div>Select a bucket or folder to view details</div></div>`
      }
      await loadBuckets()
      toast.success('Archived', `"${item.name}" moved to archive`)
    } catch (err) { toast.error('Error', err.message) }
  }

  const ctxDelete = async () => {
    const id = ctxTargetId
    const type = ctxTargetType
    hideCtxMenu()
    await deleteItem(id, type)
  }

  document.addEventListener('click', hideCtxMenu)
  document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtxMenu() })

  const handleFolderClick = (id) => {
    const expanded = isFolderExpanded(id)
    setFolderExpanded(id, !expanded)
    selectedItemId = id
    selectedItemType = 'folder'
    renderTree()
    renderDetail(id, 'folder')
  }

  // ── Drag and drop ─────────────────────────────────────────────────────────────
  const attachDragHandlers = () => {
    const tree = document.getElementById('bucket-tree')
    if (!tree) return

    // Make buckets draggable
    tree.querySelectorAll('.tree-bucket[data-bucket-id]').forEach(el => {
      const bucket = allBuckets.find(b => b.id === el.dataset.bucketId)
      if (!bucket || bucket.is_system) return
      el.draggable = true
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('bucketId', bucket.id)
        e.dataTransfer.setData('isFolder', 'false')
        el.classList.add('dragging')
      })
      el.addEventListener('dragend', () => el.classList.remove('dragging'))
    })

    // Make non-system folders draggable
    tree.querySelectorAll('.tree-folder[data-bucket-id]').forEach(el => {
      const bucket = allBuckets.find(b => b.id === el.dataset.bucketId)
      if (!bucket || bucket.is_system) return
      el.draggable = true
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('bucketId', bucket.id)
        e.dataTransfer.setData('isFolder', 'true')
        el.classList.add('dragging')
      })
      el.addEventListener('dragend', () => el.classList.remove('dragging'))
    })

    // Folder drop targets
    tree.querySelectorAll('.tree-folder[data-folder-id]').forEach(el => {
      const folderId = el.dataset.folderId
      const folder = allBuckets.find(b => b.id === folderId)
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over') })
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'))
      el.addEventListener('drop', async e => {
        e.preventDefault()
        el.classList.remove('drag-over')
        const bucketId = e.dataTransfer.getData('bucketId')
        const isFolder = e.dataTransfer.getData('isFolder') === 'true'
        if (!bucketId) return

        // Prevent dropping on itself
        if (bucketId === folderId) return

        const dragged = allBuckets.find(b => b.id === bucketId)
        const target = allBuckets.find(b => b.id === folderId)
        if (!dragged || !target) return

        // Folders can only go into depth-0 folders (result becomes depth-1)
        if (isFolder && (target.depth || 0) >= 1) {
          toast.error('Max depth', 'Cannot nest folders more than 2 levels deep')
          return
        }

        // Prevent dropping a folder into its own child
        if (isFolder) {
          const children = allBuckets.filter(b => b.parent_id === bucketId)
          if (children.some(c => c.id === folderId)) {
            toast.error('Invalid move', 'Cannot move a folder into its own subfolder')
            return
          }
        }

        // Enforce depth for buckets: can only drop into folder if resulting depth <= 2
        if (!isFolder) {
          const targetDepth = (target.depth || 0) + 1
          if (targetDepth > 2) {
            toast.error('Max depth', 'Cannot nest deeper than 3 levels')
            return
          }
        }

        await moveBucket(bucketId, folderId)
      })
    })

    // Root drop target — move dragged item to top level
    tree.addEventListener('dragover', e => e.preventDefault())
    tree.addEventListener('drop', async e => {
      if (e.target.closest('.tree-folder')) return
      const bucketId = e.dataTransfer.getData('bucketId')
      if (!bucketId) return
      const bucket = allBuckets.find(b => b.id === bucketId)
      if (!bucket || !bucket.parent_id) return
      await moveBucket(bucketId, null)
    })
  }

  const moveBucket = async (bucketId, parentId) => {
    try {
      const parent = parentId ? allBuckets.find(b => b.id === parentId) : null
      const newDepth = parent ? (parent.depth || 0) + 1 : 0
      const res = await fetch(`/buckets/${bucketId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parent_id: parentId || null, depth: newDepth })
      })
      if (!res.ok) throw new Error((await res.json()).error || 'Move failed')
      await loadBuckets()
      toast.success('Moved', parentId ? 'Moved into folder' : 'Moved to root')
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── Select + detail panel ─────────────────────────────────────────────────────
  const selectItem = (id, type) => {
    selectedItemId = id
    selectedItemType = type
    renderTree()
    renderDetail(id, type)
  }

  const renderDetail = (id, type) => {
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    const el = document.getElementById('bucket-detail')

    // All non-system, non-archived folders for parent select
    const folders = allBuckets.filter(b => b.is_folder && b.id !== id && !b.is_archived)

    if (type === 'folder') {
      const children = allBuckets.filter(b => b.parent_id === id)
      const canDelete = children.length === 0

      // Recursively count descendants for display
      const renderChildRows = (parentId, depth) => {
        const kids = allBuckets.filter(b => b.parent_id === parentId)
        return kids.map(b => {
          const indent = depth * 12
          const icon = b.is_folder ? '📁' : `<span style="width:10px;height:10px;border-radius:50%;background:${b.color};display:inline-block;flex-shrink:0;"></span>`
          return `<div class="bucket-child-row" style="padding-left:${indent}px;">
            ${icon}
            <span style="flex:1;">${esc(b.name)}</span>
            <span style="font-size:12px;color:var(--text-muted);">${b.is_folder ? '' : (b.lead_count ?? 0) + ' leads'}</span>
          </div>${renderChildRows(b.id, depth + 1)}`
        }).join('')
      }

      el.innerHTML = `<div class="detail-card">
        <div class="detail-title">📂 Folder</div>
        <div class="form-group">
          <label>Folder Name</label>
          <input type="text" id="detail-name" value="${esc(item.name)}" style="width:100%;">
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:${children.length ? '12px' : '0'};">
          ${children.length} item${children.length !== 1 ? 's' : ''} in this folder
        </div>
        ${children.length ? `<div style="margin-bottom:16px;">${renderChildRows(id, 0)}</div>` : ''}
        <div class="section-divider"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn-primary" onclick="saveDetailName('${id}','folder')">Save Name</button>
          <button class="btn-ghost" onclick="archiveItem('${id}')">📦 Archive</button>
          ${canDelete
            ? `<button class="btn-ghost" style="color:#f87171;border-color:rgba(239,68,68,0.3);" onclick="deleteItem('${id}','folder')">Delete Folder</button>`
            : `<span style="font-size:12px;color:#9ca3af;">Move or delete all items before deleting this folder.</span>`}
        </div>
      </div>`

    } else {
      const folderOpts = `<option value="">Top level (no folder)</option>` +
        folders.map(f => `<option value="${f.id}"${item.parent_id === f.id ? ' selected' : ''}>${esc(f.name)}</option>`).join('')
      const swatches = BUCKET_COLORS.map(c =>
        `<div class="color-swatch${item.color === c ? ' selected' : ''}" style="background:${c};" onclick="updateItemColor('${id}','${c}',this)"></div>`
      ).join('')
      el.innerHTML = `<div class="detail-card">
        <div class="detail-title">📁 Bucket</div>
        <div class="form-group">
          <label>Bucket Name</label>
          <input type="text" id="detail-name" value="${esc(item.name)}" style="width:100%;" ${item.is_system ? 'disabled' : ''}>
        </div>
        ${!item.is_system ? `<div class="form-group">
          <label>Color</label>
          <div class="color-swatches">${swatches}</div>
        </div>` : ''}
        <div class="form-group">
          <label>Move to Folder</label>
          <select id="detail-folder" ${item.is_system ? 'disabled' : ''}>${folderOpts}</select>
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">${item.lead_count ?? 0} leads in this bucket</div>
        <div class="section-divider"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="/leads.html?bucket_id=${id}" class="btn-primary">View Leads →</a>
          ${!item.is_system ? `<button class="btn-ghost" onclick="saveDetailBucket('${id}')">Save Changes</button>` : ''}
          ${!item.is_system ? `<button class="btn-ghost" onclick="archiveItem('${id}')">📦 Archive</button>` : ''}
          ${!item.is_system ? `<button class="btn-ghost" style="color:#f87171;border-color:rgba(239,68,68,0.3);" onclick="deleteItem('${id}','bucket')">Delete Bucket</button>` : ''}
        </div>
      </div>`
    }
  }

  // ── Archive from detail panel ─────────────────────────────────────────────────
  const archiveItem = async (id) => {
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    if (!confirm(`Archive "${item.name}"?\n\nThis will hide it and all its contents from the main view.`)) return
    try {
      const res = await fetch(`/buckets/${id}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'archive' })
      })
      if (!res.ok) throw new Error((await res.json()).error || 'Archive failed')
      selectedItemId = null
      selectedItemType = null
      document.getElementById('bucket-detail').innerHTML = `<div class="buckets-empty"><div style="font-size:32px;">📂</div><div>Select a bucket or folder to view details</div></div>`
      await loadBuckets()
      toast.success('Archived', `"${item.name}" moved to archive`)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── API helpers ───────────────────────────────────────────────────────────────
  const saveDetailName = async (id) => {
    const name = document.getElementById('detail-name')?.value.trim()
    if (!name) return toast.error('Error', 'Name is required')
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      toast.success('Saved', 'Name updated')
      renderTree()
      renderDetail(id, selectedItemType)
    } catch (err) { toast.error('Error', err.message) }
  }

  const saveDetailBucket = async (id) => {
    const name     = document.getElementById('detail-name')?.value.trim()
    const parentId = document.getElementById('detail-folder')?.value || null
    if (!name) return toast.error('Error', 'Name is required')
    const item = allBuckets.find(b => b.id === id)
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, color: item?.color, parent_id: parentId }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      toast.success('Saved', 'Bucket updated')
      renderTree()
      renderDetail(id, 'bucket')
    } catch (err) { toast.error('Error', err.message) }
  }

  const updateItemColor = async (id, color, swatchEl) => {
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ color }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'))
      swatchEl.classList.add('selected')
      renderTree()
      toast.success('Color saved', '')
    } catch (err) { toast.error('Error', err.message) }
  }

  const deleteItem = async (id, type) => {
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    if (!confirm(`Delete ${type} "${item.name}"?`)) return
    try {
      const res = await fetch(`/buckets/${id}`, { method:'DELETE' })
      if (!res.ok) throw new Error((await res.json()).error || 'Delete failed')
      allBuckets = allBuckets.filter(b => b.id !== id)
      if (type === 'folder') allBuckets.forEach(b => { if (b.parent_id === id) b.parent_id = null })
      selectedItemId = null
      selectedItemType = null
      renderTree()
      document.getElementById('bucket-detail').innerHTML = `<div class="buckets-empty"><div style="font-size:32px;">📂</div><div>Select a bucket or folder to view details</div></div>`
      toast.success('Deleted', `${type === 'folder' ? 'Folder' : 'Bucket'} removed`)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── New Folder modal ──────────────────────────────────────────────────────────
  const openNewFolderModal = () => {
    document.getElementById('new-folder-name').value = ''
    // If selected item is a depth-0 folder, offer to create sub-folder inside it
    const parentGroup = document.getElementById('new-folder-parent-group')
    const parentSel = document.getElementById('new-folder-parent')
    const depth0Folders = allBuckets.filter(b => b.is_folder && (b.depth === 0 || !b.parent_id))
    if (depth0Folders.length > 0) {
      parentSel.innerHTML = '<option value="">Top level</option>' +
        depth0Folders.map(f => `<option value="${f.id}"${selectedItemType === 'folder' && selectedItemId === f.id ? ' selected' : ''}>${esc(f.name)}</option>`).join('')
      parentGroup.style.display = ''
    } else {
      parentGroup.style.display = 'none'
    }
    document.getElementById('new-folder-modal').classList.add('open')
    setTimeout(() => document.getElementById('new-folder-name').focus(), 50)
  }
  const closeNewFolderModal = () => document.getElementById('new-folder-modal').classList.remove('open')

  const saveNewFolder = async () => {
    const name = document.getElementById('new-folder-name').value.trim()
    const parentId = document.getElementById('new-folder-parent')?.value || null
    if (!name) return toast.error('Error', 'Folder name is required')
    try {
      const res = await fetch('/buckets', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, is_folder:true, color:'#6366f1', parent_id: parentId }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Failed to create')
      data.bucket.lead_count = 0
      allBuckets.push(data.bucket)
      closeNewFolderModal()
      renderTree()
      selectItem(data.bucket.id, 'folder')
      toast.success('Folder created', name)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── New Bucket modal ──────────────────────────────────────────────────────────
  const openNewBucketModal = () => {
    document.getElementById('new-bucket-name').value = ''
    newBucketColor = BUCKET_COLORS[0]
    const folderSel = document.getElementById('new-bucket-folder')
    // Show all non-archived folders (depth 0 and depth 1)
    const folders = allBuckets.filter(b => b.is_folder)
    folderSel.innerHTML = '<option value="">Top level (no folder)</option>' +
      folders.map(f => {
        const indent = (f.depth || 0) > 0 ? '  └ ' : ''
        return `<option value="${f.id}"${selectedItemType === 'folder' && selectedItemId === f.id ? ' selected' : ''}>${indent}${esc(f.name)}</option>`
      }).join('')
    document.getElementById('new-bucket-colors').innerHTML = BUCKET_COLORS.map(c =>
      `<div class="color-swatch${c === newBucketColor ? ' selected' : ''}" style="background:${c};" onclick="newBucketPickColor('${c}',this)"></div>`
    ).join('')
    document.getElementById('new-bucket-modal').classList.add('open')
    setTimeout(() => document.getElementById('new-bucket-name').focus(), 50)
  }
  const closeNewBucketModal = () => document.getElementById('new-bucket-modal').classList.remove('open')
  const newBucketPickColor  = (c, el) => {
    newBucketColor = c
    document.querySelectorAll('#new-bucket-colors .color-swatch').forEach(s => s.classList.remove('selected'))
    el.classList.add('selected')
  }
  const saveNewBucket = async () => {
    const name     = document.getElementById('new-bucket-name').value.trim()
    const parentId = document.getElementById('new-bucket-folder').value || null
    if (!name) return toast.error('Error', 'Bucket name is required')
    try {
      const res = await fetch('/buckets', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, color:newBucketColor, parent_id:parentId, is_folder:false }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Failed to create')
      data.bucket.lead_count = 0
      allBuckets.push(data.bucket)
      closeNewBucketModal()
      renderTree()
      selectItem(data.bucket.id, 'bucket')
      toast.success('Bucket created', name)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  const init = async () => {
    await loadProfile()
    await loadBuckets()
  }
  document.addEventListener('DOMContentLoaded', init)
</script>
</body>
</html>
