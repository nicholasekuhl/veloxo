<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invite — Veloxo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0b; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
    .card { background: #111114; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.08); }
    .logo { font-family: 'Instrument Serif', Georgia, serif; font-size: 28px; font-weight: 400; color: #f0efe8; margin-bottom: 4px; letter-spacing: -0.3px; }
    .logo span { color: #7c6ff7; }
    .sub { font-size: 13px; color: rgba(240,239,232,0.45); margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    label { display: block; font-size: 13px; font-weight: 500; color: rgba(240,239,232,0.6); margin-bottom: 5px; }
    input { width: 100%; padding: 10px 14px; background: #18181c; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; color: #f0efe8; }
    input::placeholder { color: rgba(240,239,232,0.3); }
    input:focus { border-color: rgba(124,111,247,0.5); }
    input:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn { width: 100%; padding: 11px; background: #7c6ff7; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 4px; letter-spacing: -0.01em; }
    .btn:hover { background: #a89cf9; }
    .btn:active { background: #6b5ef0; }
    .btn:disabled { background: rgba(124,111,247,0.35); cursor: not-allowed; }
    .error { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .invalid-state { text-align: center; padding: 16px 0; }
    .invalid-state p { color: rgba(240,239,232,0.6); font-size: 14px; line-height: 1.6; }
    .inline-error { color: #fca5a5; font-size: 12px; margin-top: 4px; display: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vel<span>oxo</span></div>
    <div class="sub">You've been invited — set up your account</div>
    <div class="error" id="error-msg"></div>

    <div id="loading-state" style="color:rgba(240,239,232,0.45);font-size:14px;padding:8px 0 24px;">Verifying invite...</div>

    <div id="form-state" class="hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="invite-email" disabled>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="invite-first-name" placeholder="Jane" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="invite-last-name" placeholder="Smith" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="invite-password" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="invite-confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkMatch()">
        <div class="inline-error" id="pwd-mismatch">Passwords do not match</div>
      </div>
      <button class="btn" id="submit-btn" onclick="acceptInvite()">Create Account</button>
    </div>

    <div id="invalid-state" class="hidden invalid-state">
      <p id="invalid-reason">This invite link is invalid or has already been used.</p>
      <p style="margin-top:12px;font-size:13px;color:rgba(240,239,232,0.35);">Contact your administrator for a new invite.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const token = params.get('token')

    const show = (id) => {
      ['loading-state', 'form-state', 'invalid-state'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id)
      })
    }

    const verifyToken = async () => {
      if (!token) { document.getElementById('invalid-reason').textContent = 'No invite token found in this link.'; show('invalid-state'); return }
      try {
        const res = await fetch(`/auth/invite/verify?token=${encodeURIComponent(token)}`)
        const data = await res.json()
        if (!data.valid) {
          document.getElementById('invalid-reason').textContent = data.reason || 'This invite link is invalid or has already been used.'
          show('invalid-state')
        } else {
          document.getElementById('invite-email').value = data.email
          show('form-state')
        }
      } catch {
        document.getElementById('invalid-reason').textContent = 'Unable to verify invite. Please try again.'
        show('invalid-state')
      }
    }

    const checkMatch = () => {
      const pwd = document.getElementById('invite-password').value
      const confirm = document.getElementById('invite-confirm').value
      const el = document.getElementById('pwd-mismatch')
      el.style.display = confirm && pwd !== confirm ? 'block' : 'none'
    }

    const acceptInvite = async () => {
      const first_name = document.getElementById('invite-first-name').value.trim()
      const last_name = document.getElementById('invite-last-name').value.trim()
      const password = document.getElementById('invite-password').value
      const confirm = document.getElementById('invite-confirm').value
      const btn = document.getElementById('submit-btn')
      const errEl = document.getElementById('error-msg')

      errEl.style.display = 'none'
      if (!first_name || !last_name) { errEl.textContent = 'First and last name are required.'; errEl.style.display = 'block'; return }
      if (!password) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; return }
      if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Creating account...'

      try {
        const res = await fetch('/auth/invite/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, first_name, last_name, password })
        })
        const data = await res.json()
        if (data.success) {
          if (data.needsManualLogin) {
            window.location.href = '/login.html'
          } else {
            window.location.href = '/onboarding.html'
          }
        } else {
          errEl.textContent = data.error || 'Something went wrong.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create Account'
        }
      } catch {
        errEl.textContent = 'Something went wrong. Please try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Create Account'
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') acceptInvite() })

    verifyToken()
  </script>
</body>
</html>
